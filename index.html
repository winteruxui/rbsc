/* ============ SEARCH (icon → expanding panel) ============ */
function closeSearch(){const s=$('#search'); s.classList.remove('open'); $('#searchToggle').setAttribute('aria-expanded','false');}
function runSearch(){
  const q=$('#searchInput').value.trim().toLowerCase(); const box=$('#searchResults');
  if(!q){box.innerHTML=''; return;}
  let items=(DATA.searchMock||[]).filter(i=>i.name.toLowerCase().includes(q)||(i.sub||'').toLowerCase().includes(q)||(i.label||'').toLowerCase().includes(q));
  box.innerHTML='';
  if(!items.length){box.append(el('div',{class:'search-empty'}, icon('search-off',18), el('span',{},'ไม่พบผลลัพธ์สำหรับ "'+q+'"')));}
  else items.slice(0,6).forEach(i=>{
    const a=el('a',{href:'#'},el('div',{},i.name),el('div',{class:'cat'},i.label||i.type));
    a.addEventListener('click',ev=>{ev.preventDefault(); closeSearch(); $('#searchInput').value=''; box.innerHTML='';
      if(i.go)go(i.go,i.opts); });
    box.append(a);
  });
}
$('#searchToggle').addEventListener('click',e=>{e.stopPropagation();
  const s=$('#search'); const open=s.classList.toggle('open');
  $('#searchToggle').setAttribute('aria-expanded',open);
  if(open){ setTimeout(()=>$('#searchInput').focus(),0); runSearch(); }});
$('#searchInput').addEventListener('input',runSearch);
$('#searchInput').addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();});
document.addEventListener('click',e=>{if(!e.target.closest('.search'))closeSearch();});

/* ============ SHARED RENDER HELPERS ============ */
function statusChip(status){
  const map={upcoming:['chip-upcoming','กำลังจะถึง'],live:['chip-live','● แข่งสด'],done:['chip-done','จบแล้ว']};
  const [cls,txt]=map[status]||map.upcoming;
  return el('span',{class:'chip-status '+cls}, txt);
}
function metaItem(ico,k,v,tip,accent){
  const kEl=el('span',{class:'mi-k'},k); if(tip)kEl.append(tooltip(tip));
  return el('div',{class:'meta-item'},
    el('span',{class:'mi-ico','aria-hidden':'true'}, icon(ico,22)),
    el('div',{}, kEl, el('span',{class:'mi-v'+(accent?' accent':'')},v)));
}
/* breadcrumb — items:[{t,go?,opts?,dead?}|{t,current:true}] */
function breadcrumb(items){
  const bc=el('nav',{class:'breadcrumb','aria-label':'breadcrumb'});
  items.forEach((it,i)=>{
    if(i)bc.append(el('span',{class:'sep','aria-hidden':'true'},'›'));
    if(it.current){bc.append(el('span',{class:'current','aria-current':'page'},it.t)); return;}
    const a=el('a',{href:'#'},it.t);
    a.addEventListener('click',e=>{e.preventDefault(); it.dead?placeholder('ส่วนนี้อยู่นอกขอบเขต prototype'):go(it.go,it.opts);});
    bc.append(a);
  });
  return bc;
}

/* ============ P1 — LANDING (§4.1) ============ */
RENDERERS.landing=function(sec){

    window.addEventListener('resize', window._setVW);
    window.addEventListener('load', window._setVW);
    window._vwBound=true;
  }
  /* re-measure once the vertical scrollbar settles (clientWidth excludes it, vw doesn't) */

  /* 1. HERO BANNER — full-bleed; rotating lead text + today card + next-days strip */

  vp.append(leadSlider);

    const d=el('button',{class:'hero-dot'+(i===0?' on':''),'aria-label':'สไลด์ '+(i+1)});

  lead.append(vp, dotsWrap);
  function goTo(i){

  function resetT(){if(window._heroTimer)clearInterval(window._heroTimer); window._heroTimer=setInterval(()=>goTo(slideIdx+1),5500);}
  resetT();

  /* 1b. RIGHT — today's racing card */
  const todayCard=el('div',{class:'hero-today'},
    el('div',{class:'ht-head'},
      el('span',{class:'badge-today i18n','data-th':m.isToday?'แข่งวันนี้':'วันแข่งถัดไป','data-en':m.isToday?'Racing Today':'Next Meeting'}, m.isToday?'แข่งวันนี้':'วันแข่งถัดไป'),

const THAI_MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const THAI_DOW=['อา','จ','อ','พ','พฤ','ศ','ส'];
/* month-calendar grid with race days highlighted (P3.1, Bahrain Ref 2 / HKJC Ref 3) */
function raceMonthGrid(year, mi, fixtures, onPick){
  const monLabel=THAI_MONTHS[mi];
  const inMonth=fixtures.map((f,idx)=>({f,idx})).filter(o=>o.f.mon===monLabel);
  const first=new Date(year,mi,1).getDay();
  const days=new Date(year,mi+1,0).getDate();
  const grid=el('div',{class:'cal-month'});
  grid.append(el('div',{class:'cal-title'}, monLabel+' '+year));
  const g=el('div',{class:'cal-grid'});
  THAI_DOW.forEach(d=>g.append(el('span',{class:'cal-dow'},d)));
  for(let i=0;i<first;i++)g.append(el('span',{class:'cal-cell empty'}));
  for(let d=1;d<=days;d++){
    const dd=String(d).padStart(2,'0');
    const race=inMonth.find(o=>o.f.dd===dd);
    if(race){
      const sel=race.idx===rdState.idx;
      const c=el('button',{class:'cal-cell cal-race'+(sel?' cal-sel':''),title:race.f.name+' · '+race.f.feature}, String(d));
      c.addEventListener('click',()=>onPick(race.idx));
      g.append(c);
    } else g.append(el('span',{class:'cal-cell'}, String(d)));
  }
  grid.append(g);
  return grid;
}

/* form digits: 1-9 = finishing position, 0 = 10th+. latest is rightmost. */
function formSegClass(d){const n=+d; if(n>=1&&n<=3)return 'g'; if(n>=4&&n<=6)return 'w'; return 'b';}
function formBar(form){
  const bar=el('span',{class:'form-bar','aria-label':'ฟอร์ม 6 รอบล่าสุด: '+form});
  for(const ch of String(form))bar.append(el('span',{class:formSegClass(ch),title:(ch==='0'?'ที่ 10+':'ที่ '+ch)}));
  return bar;
}
/* lower score = better form (0 counts as 10th). used for "best form in race" highlight */
function formScore(form){const ds=String(form).split('').map(c=>c==='0'?10:+c); return ds.reduce((a,b)=>a+b,0)/ds.length;}
function formTagLabel(tag){return {good:'ฟอร์มดี',warn:'กำลังพัฒนา',bad:'ห่างหาย'}[tag]||'—';}
function deltaSpan(d){const cls=d>0?'delta-up':(d<0?'delta-dn':'delta-0'); const txt=d>0?'+'+d:(d<0?String(d):'0'); return el('span',{class:cls},txt);}

/* donut ring (segments newest→) */
function donutSVG(parts,size){
  const S=size||92, r=S/2-7, cx=S/2, cy=S/2, C=2*Math.PI*r;
  const total=parts.reduce((a,p)=>a+p.val,0)||1;
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox','0 0 '+S+' '+S); svg.setAttribute('width',S); svg.setAttribute('height',S); svg.setAttribute('aria-hidden','true');
  const mk=(t,a)=>{const n=document.createElementNS(NS,t); for(const k in a)n.setAttribute(k,a[k]); return n;};
  svg.append(mk('circle',{cx,cy,r,fill:'none',stroke:'rgba(255,255,255,.18)','stroke-width':9}));
  let off=0;
  parts.forEach(p=>{ if(p.val<=0)return; const len=C*(p.val/total);
    svg.append(mk('circle',{cx,cy,r,fill:'none',stroke:p.color,'stroke-width':9,
      'stroke-dasharray':len+' '+(C-len),'stroke-dashoffset':-off,transform:'rotate(-90 '+cx+' '+cy+')'}));
    off+=len; });
  return svg;
}

/* ===== rating-trend line-chart (narrative §10) — inline SVG, no chart lib ===== */
function ratingChart(h){
  const data=(h.form||[]).filter(f=>typeof f.rtg==='number').slice().reverse(); // oldest→newest
  if(data.length<3) return null;
  const NS='http://www.w3.org/2000/svg';
  const mk=(t,a,txt)=>{const n=document.createElementNS(NS,t); for(const k in a)n.setAttribute(k,a[k]); if(txt!=null)n.textContent=txt; return n;};
  const ratings=data.map(f=>f.rtg);
  const minR=Math.min(...ratings), maxR=Math.max(...ratings);
  const lo=minR-3, hi=maxR+3;
  const W=720,H=210,padL=42,padR=18,padT=18,padB=34;
  const plotW=W-padL-padR, plotH=H-padT-padB, baseY=padT+plotH;
  const xAt=i=> data.length<2?padL+plotW/2 : padL+(i/(data.length-1))*plotW;
  const yAt=r=> padT+(1-(r-lo)/(hi-lo))*plotH;
  const svg=mk('svg',{viewBox:'0 0 '+W+' '+H,role:'img','aria-label':'กราฟแนวโน้มเรตติ้งย้อนหลัง'});
  /* gradient defs for the area fill */
  const defs=mk('defs',{}); const grad=mk('linearGradient',{id:'rcgrad',x1:0,y1:0,x2:0,y2:1});
  grad.append(mk('stop',{offset:'0%','stop-color':'var(--gold-500)','stop-opacity':'.22'}));
  grad.append(mk('stop',{offset:'100%','stop-color':'var(--gold-500)','stop-opacity':'0'}));
  defs.append(grad); svg.append(defs);
  /* y gridlines + labels (min, mid, max) */
  [...new Set([minR, Math.round((minR+maxR)/2), maxR])].forEach(v=>{
    const y=yAt(v);
    svg.append(mk('line',{x1:padL,y1:y,x2:W-padR,y2:y,class:'rc-grid'}));
    svg.append(mk('text',{x:padL-8,y:y+4,class:'rc-axislab','text-anchor':'end'},String(v)));
  });
  /* area + line */
  let dArea='M '+xAt(0)+' '+yAt(ratings[0]);
  data.forEach((f,i)=>{ dArea+=' L '+xAt(i)+' '+yAt(f.rtg); });
  dArea+=' L '+xAt(data.length-1)+' '+baseY+' L '+xAt(0)+' '+baseY+' Z';
  svg.append(mk('path',{d:dArea,class:'rc-area'}));
  let dLine='M '+xAt(0)+' '+yAt(ratings[0]);
  data.forEach((f,i)=>{ if(i>0)dLine+=' L '+xAt(i)+' '+yAt(f.rtg); });
  svg.append(mk('path',{d:dLine,class:'rc-line'}));
  /* points coloured by finish (traffic-light) */
  const dotColor=f=> f.pos===1?'var(--gold-500)':(f.pos>=2&&f.pos<=3)?'var(--good)':f.pos===0?'var(--bad)':'var(--green-700)';
  data.forEach((f,i)=>{
    const c=mk('circle',{cx:xAt(i),cy:yAt(f.rtg),r:4.5,class:'rc-dot',fill:dotColor(f)});
    c.append(mk('title',{},f.date+' · '+(f.pos===0?'ไม่จบ':'อันดับ '+f.pos+'/'+f.field)+' · เรตติ้ง '+f.rtg));
    svg.append(c);
  });
  /* x labels: first & last meeting date (timespan) */
  svg.append(mk('text',{x:xAt(0),y:H-12,class:'rc-axislab','text-anchor':'start'},data[0].date));
  svg.append(mk('text',{x:xAt(data.length-1),y:H-12,class:'rc-axislab','text-anchor':'end'},data[data.length-1].date));
  /* caption — states the trend in words (a11y: colour is never the only signal) */
  const first=ratings[0], last=ratings[ratings.length-1], diff=last-first;
  const up=diff>=3, down=diff<=-3;
  const capText=(diff===0||(!up&&!down))
    ? 'เรตติ้งทรงตัวราว '+last+' ตลอด '+data.length+' เรซล่าสุด'
    : 'เรตติ้ง'+(up?'ขยับขึ้น':'ปรับลดลง')+' '+(diff>0?'+'+diff:diff)+' จาก '+first+' เป็น '+last+' ใน '+data.length+' เรซล่าสุด';
  const wrap=el('div',{class:'section-gap'});
  wrap.append(el('div',{class:'flex gap2 center',style:'margin-bottom:var(--s3)'},
    el('h2',{class:'i18n h-inline','data-th':'แนวโน้มเรตติ้ง','data-en':'Rating Trend'},'แนวโน้มเรตติ้ง'),
    tooltip('เรตติ้งอย่างเป็นทางการในแต่ละครั้งที่ลงแข่ง เรียงจากเก่า (ซ้าย) ไปใหม่ (ขวา) — แนวโน้มขึ้นสะท้อนฟอร์มที่กำลังพัฒนา')));
  const cardEl=el('div',{class:'rating-chart'});
  cardEl.append(svg);
  cardEl.append(el('div',{class:'rc-caption'+(up?' up':down?' down':'')},
    icon(up?'trend-up':down?'trend-down':'minus-circle',18), el('span',{},capText)));
  cardEl.append(el('div',{class:'rc-legend'},
    el('span',{}, el('i',{style:'background:var(--gold-500)'}),'ชนะ'),
    el('span',{}, el('i',{style:'background:var(--good)'}),'ที่ 2–3'),
    el('span',{}, el('i',{style:'background:var(--green-700)'}),'อันดับอื่น')));

}

/* simple responsive SVG rating line — viewBox-based so it scales */
function ratingSVG(data){
  const W=600,H=180,pad=34;
  const min=Math.min(...data)-2, max=Math.max(...data)+2;
  const x=i=>pad+(i*(W-pad*2)/(data.length-1));
  const y=v=>H-pad-((v-min)/(max-min))*(H-pad*2);
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('role','img');
  svg.setAttribute('aria-label','กราฟเรตติ้ง 8 การแข่งล่าสุด ค่าล่าสุด '+data[data.length-1]);
  const mk=(t,a)=>{const n=document.createElementNS(NS,t); for(const k in a)n.setAttribute(k,a[k]); return n;};
  /* gridlines */
  [min,(min+max)/2,max].forEach(v=>{
    svg.append(mk('line',{x1:pad,y1:y(v),x2:W-pad,y2:y(v),stroke:'#e2e6e1','stroke-width':1}));
    const lbl=mk('text',{x:pad-6,y:y(v)+4,'text-anchor':'end',class:'rc-tip-label'}); lbl.textContent=Math.round(v); svg.append(lbl);
  });
  /* line path */
  const d=data.map((v,i)=>(i?'L':'M')+x(i)+' '+y(v)).join(' ');
  svg.append(mk('path',{d,fill:'none',stroke:'var(--green-700)','stroke-width':2.5,'stroke-linejoin':'round'}));
  /* dots + value labels on click */
  data.forEach((v,i)=>{
    const c=mk('circle',{cx:x(i),cy:y(v),r:4.5,class:'rc-dot'});
    const t=mk('text',{x:x(i),y:y(v)-12,'text-anchor':'middle',class:'rc-tip-label',style:'display:none'}); t.textContent=v;
    c.addEventListener('click',()=>{const vis=t.style.display!=='none'; svg.querySelectorAll('text.rc-tip-label[data-dot]').forEach(e=>e.style.display='none'); t.style.display=vis?'none':'block';});
    t.setAttribute('data-dot','1');
    svg.append(c,t);
  });
  return svg;
}

  const cfg=DIR_CONFIG[kind];
  sec.innerHTML='';

  /* category tab strip (on-page switching) */
  const tabs=el('div',{class:'race-tabs','aria-label':'หมวดหมู่'});

  const input=el('input',{type:'search',placeholder:cfg.placeholder,'aria-label':'ค้นหา'});

  const sortBtn=el('button',{class:'ff-chip'}, icon('list',15),' เรียง: '+(dirState.sort[kind]==='name'?'ชื่อ':'อันดับ'));
  sortBtn.addEventListener('click',()=>{ dirState.sort[kind]=dirState.sort[kind]==='name'?cfg.defaultSort:'name'; renderDirectory(sec,kind); setLang(document.documentElement.getAttribute('data-lang')||'th'); });
  sec.append(el('div',{class:'section-gap'},
    el('div',{class:'flex between center wrap',style:'gap:var(--s3); margin-bottom:var(--s3)'},
      el('div',{class:'flex gap2 center'},
        el('h2',{class:'h-inline'}, cfg.listTitle),
        el('span',{class:'muted small'}, cfg.rows().length+' '+cfg.unit)),
      sortBtn),
    finder));
  /* horse-type filter chips (SOW §3.3) */
  let typeChips=null;
  if(kind==='horses'){
    typeChips=el('div',{class:'form-filter'});
    typeChips.append(el('span',{class:'muted small',style:'align-self:center'},'ประเภท:'));

      c.addEventListener('click',()=>{ dirState.type=id; draw(); typeChips.querySelectorAll('.ff-chip').forEach(b=>b.classList.remove('on')); c.classList.add('on'); });
      typeChips.append(c);
    });
    sec.append(typeChips);
  }
  /* table */
  const wrap=el('div',{class:'simple-table-wrap'});
  const tbl=el('table',{class:'simple-table'});
  const trh=el('tr'); cfg.cols.forEach(c=>trh.append(el('th',{class:c.num?'num':''}, c.label))); tbl.append(el('thead',{},trh));
  const tb=el('tbody'); tbl.append(tb); wrap.append(tbl);

    el('div',{class:'muted small'},'ลองพิมพ์ชื่ออื่น หรือล้างช่องค้นหา'));
  function draw(){
    const q=dirState.q[kind].trim().toLowerCase();
    let rows=cfg.rows().filter(r=>!q||cfg.match(r,q));
    if(kind==='horses' && dirState.type!=='all') rows=rows.filter(r=>r.type===dirState.type);
    if(dirState.sort[kind]==='name')rows=rows.slice().sort((a,b)=>cfg.nameOf(a).localeCompare(cfg.nameOf(b),'th'));

      : el('a',{href:'#',class:'ent-link strong'}, r.name);
    nameCell.addEventListener('click',e=>{e.preventDefault(); go(dest);});
    const mid = tab==='owners'?String(r.horses) : String(tab==='jockeys'?r.rides:r.runners);
    tb.append(el('tr',{},
      el('td',{class:'num mono'}, el('span',{class:'st-rank'+(r.rank===1?' lead':'')}, String(r.rank))),
      el('td',{}, nameCell),
      el('td',{class:'num mono'}, String(r.wins)),
      el('td',{class:'num mono'}, mid),
      el('td',{class:'num mono'}, r.winPct+'%')));
  });
  /* reorder owners columns: rank, name, horses, wins, pct -> our head matches that order */
  tbl.append(tb); wrap.append(tbl); sec.append(wrap);
};

/* ============ P10 — NEWS (SOW §3.4) ============ */
const newsState={cat:'all'};
RENDERERS.news=function(sec){
  sec.innerHTML='';
  const rerender=()=>{ RENDERERS.news(sec); setLang(document.documentElement.getAttribute('data-lang')||'th'); };
  sec.append(breadcrumb([{t:'หน้าแรก',go:'landing'},{t:'ข่าว',current:true}]));
  sec.append(el('div',{class:'page-head'},
    el('div',{},
      el('div',{class:'eyebrow-line'},'ข่าวสาร & เนื้อหา'),
      el('h1',{class:'i18n','data-th':'ข่าวสนามแข่ง','data-en':'Race News'},'ข่าวสนามแข่ง'),
      el('div',{class:'muted'},'อัปเดตข่าวการแข่ง พรีวิว สรุปผล ประกาศสำคัญ และบทความพิเศษ'))));
  const cats=['all',...[...new Set(DATA.news.map(n=>n.cat))]];
  const chips=el('div',{class:'form-filter'});
  cats.forEach(c=>{ const on=newsState.cat===c; const b=el('button',{class:'ff-chip'+(on?' on':'')}, c==='all'?'ทั้งหมด':c);
    b.addEventListener('click',()=>{ newsState.cat=c; rerender(); }); chips.append(b); });
  sec.append(chips);
  const list=DATA.news.filter(n=>newsState.cat==='all'||n.cat===newsState.cat);
  const grid=el('div',{class:'news-grid section-gap'});
  list.forEach(n=>{
    const card=el('a',{href:'#',class:'card news-card'});
    card.addEventListener('click',e=>{e.preventDefault(); n.raceNo?go('racecard',{no:n.raceNo}):placeholder('บทความข่าวฉบับเต็มจะแสดงในเวอร์ชันจริง');});
    card.append(
      el('div',{class:'news-thumb'}, el('img',{src:n.img,alt:n.cat,loading:'lazy'}), el('span',{class:'news-cat'},n.cat)),
      el('div',{class:'news-body'}, el('div',{class:'ni-title'},n.title), el('div',{class:'ni-ex'},n.excerpt),
        el('div',{class:'ni-date',style:'margin-top:var(--s2)'}, icon('calendar',13), n.date)));
    grid.append(card);
  });
  sec.append(grid);
};
