<!DOCTYPE html>
<html lang="th" data-lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBSC Racing — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ §3 DESIGN TOKENS ============ */
:root{
  /* spacing — 4px grid */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px; --s8:64px;
  /* color — RBSC green/gold heritage */
  --green-900:#0F3D2E; --green-700:#1B5E43; --green-50:#E8F2ED;
  --gold-500:#C9A227;
  --ink-900:#1A1A1A; --ink-600:#5C5C5C; --line:#E2E2E2;
  --bg:#FFFFFF; --bg-alt:#F7F8F7;
  --good:#2E7D32; --warn:#ED6C02; --bad:#9E9E9E;
  /* type */
  --font-ui:"IBM Plex Sans Thai",system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-mono:"IBM Plex Mono","SF Mono",ui-monospace,monospace;
  /* motion */
  --tr:0.18s ease;
  --maxw:1200px;
  --radius:10px;
  --radius-lg:14px;
  --shadow:0 1px 3px rgba(15,61,46,.08),0 4px 12px rgba(15,61,46,.06);
  --shadow-lg:0 2px 6px rgba(15,61,46,.10),0 12px 32px rgba(15,61,46,.10);
}
/* ============ BASE / RESET ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-ui); font-weight:400; font-size:1rem;
  line-height:1.6; color:var(--ink-900); background:var(--bg);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3{line-height:1.3; font-weight:600; color:var(--green-900)}
h1{font-size:2rem} h2{font-size:1.5rem} h3{font-size:1.25rem}
small,.small{font-size:.875rem}
a{color:var(--green-700); text-decoration:none}
a:hover{text-decoration:underline}
ul{list-style:none}
img{max-width:100%; display:block}
button{font-family:inherit; cursor:pointer}
.mono{font-family:var(--font-mono); font-variant-numeric:tabular-nums}
/* visible focus ring everywhere */
:focus-visible{outline:3px solid var(--gold-500); outline-offset:2px; border-radius:4px}
.ico{display:inline-block; vertical-align:-.18em; flex:0 0 auto}
/* ============ LAYOUT ============ */
.container{max-width:var(--maxw); margin:0 auto; padding:0 var(--s4)}
.page{display:none; padding:var(--s6) 0 var(--s8)}
.page.active{display:block; animation:fade var(--tr)}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.section-gap{margin-top:var(--s7)}
/* ============ SHARED COMPONENTS ============ */
/* buttons — touch target ≥44px */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:var(--s2);
  min-height:44px; padding:var(--s2) var(--s5); border:1px solid transparent;
  border-radius:8px; font-size:1rem; font-weight:500; line-height:1.2;
  transition:background var(--tr),border-color var(--tr),color var(--tr);
}
.btn-primary{background:var(--green-700); color:#fff}
.btn-primary:hover{background:var(--green-900); text-decoration:none}
.btn-gold{background:var(--gold-500); color:#1A1A1A}
.btn-gold:hover{background:#b3901f; text-decoration:none}
.btn-ghost{background:transparent; color:var(--green-700); border-color:var(--line)}
.btn-ghost:hover{background:var(--green-50); text-decoration:none}
.btn-sm{min-height:44px; padding:var(--s1) var(--s3); font-size:.875rem}
/* cards */
.card{background:var(--bg); border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4); box-shadow:var(--shadow)}
.card-flat{background:var(--bg-alt); border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4)}
/* chips */
.chip{display:inline-flex; align-items:center; justify-content:center; min-width:40px; min-height:40px; padding:var(--s1) var(--s3); border-radius:999px; border:1px solid var(--line); background:var(--bg); font-weight:500; font-size:.9375rem; transition:all var(--tr)}
.chip:hover{background:var(--green-50); border-color:var(--green-700); text-decoration:none}
.chip-status{min-height:28px; padding:2px var(--s3); font-size:.8125rem; font-weight:500; border:none}
.chip-upcoming{background:var(--green-50); color:var(--green-900)}
.chip-live{background:#FDECEA; color:#C62828}
.chip-done{background:#EEE; color:var(--ink-600)}
/* breadcrumb */
.breadcrumb{display:flex; flex-wrap:wrap; align-items:center; gap:var(--s2); font-size:.875rem; color:var(--ink-600); margin-bottom:var(--s4)}
.breadcrumb a{color:var(--ink-600)}
.breadcrumb a:hover{color:var(--green-700)}
.breadcrumb .sep{opacity:.5}
.breadcrumb .current{color:var(--ink-900); font-weight:500}
/* tables */
table{border-collapse:collapse; width:100%; font-size:.9375rem; line-height:1.5}
th,td{padding:var(--s3); text-align:left; border-bottom:1px solid var(--line)}
thead th{background:var(--green-900); color:#fff; font-weight:500; white-space:nowrap}
tbody tr:nth-child(even){background:var(--bg-alt)}
/* tooltip */
.tip{position:relative; display:inline-flex; align-items:center}
.tip-btn{display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; border:1px solid var(--ink-600); background:transparent; color:var(--ink-600); font-size:.75rem; font-weight:600; line-height:1; margin-left:var(--s1)}
.tip-btn:hover,.tip-btn:focus-visible{background:var(--green-700); color:#fff; border-color:var(--green-700)}
.tip-pop{position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); z-index:60; width:max-content; max-width:240px; padding:var(--s2) var(--s3); background:var(--ink-900); color:#fff; font-size:.8125rem; font-weight:400; line-height:1.5; border-radius:8px; box-shadow:var(--shadow); opacity:0; visibility:hidden; transition:opacity var(--tr)}
.tip-pop::after{content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:var(--ink-900)}
.tip.open .tip-pop{opacity:1; visibility:visible}
/* demo / dead-link badge */
.badge-demo{display:inline-block; padding:1px var(--s2); font-size:.6875rem; font-weight:500; border-radius:4px; background:var(--green-50); color:var(--green-900); margin-left:var(--s1)}
.badge-feat{display:inline-flex; align-items:center; gap:3px; padding:1px var(--s2); font-size:.6875rem; font-weight:600; border-radius:4px; background:var(--gold-500); color:var(--green-900); margin-left:var(--s2)}
.inline-link{display:inline-flex; align-items:center; gap:var(--s1)}
.inline-link .ico{transition:transform var(--tr)}
.inline-link:hover .ico{transform:translateX(3px)}
.scroll-hint{display:flex; align-items:center; gap:var(--s1)}
.scroll-hint .ico{color:var(--green-700)}
.dead{color:var(--ink-600); cursor:not-allowed}
/* form traffic-light */
.form-bar{display:inline-flex; gap:3px}
.form-bar span{width:10px; height:18px; border-radius:2px; background:var(--bad)}
.form-bar span.g{background:var(--good)} .form-bar span.w{background:var(--warn)} .form-bar span.b{background:var(--bad)}
.tag{display:inline-block; padding:2px var(--s2); border-radius:6px; font-size:.8125rem; font-weight:500}
.tag-good{background:#E6F4EA; color:var(--good)} .tag-warn{background:#FDF0E3; color:var(--warn)} .tag-bad{background:#EEE; color:var(--ink-600)}
/* ============ HEADER / NAV ============ */
header.site{position:sticky; top:0; z-index:50; background:var(--green-900); color:#fff; box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nav-row{display:flex; align-items:center; gap:var(--s4); min-height:60px}
.logo{display:flex; align-items:center; gap:var(--s2); color:#fff; font-weight:600; font-size:1.125rem; white-space:nowrap}
.logo:hover{text-decoration:none; opacity:.9}
.logo .mark{width:36px; height:36px; border-radius:50%; background:var(--gold-500); color:var(--green-900); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:.8rem}
nav.main{display:flex; align-items:center; gap:var(--s1); flex:1}
nav.main a{color:#E8F2ED; padding:var(--s2) var(--s3); border-radius:6px; font-size:.9375rem; font-weight:500; transition:background var(--tr)}
nav.main a:hover{background:rgba(255,255,255,.12); text-decoration:none}
nav.main a.active{background:var(--green-700); color:#fff}
nav.main a.dead{color:#9DB8AD}
.nav-tools{display:flex; align-items:center; gap:var(--s2)}
/* lang toggle */
.lang{display:flex; border:1px solid rgba(255,255,255,.3); border-radius:6px; overflow:hidden}
.lang button{background:transparent; color:#E8F2ED; border:none; padding:6px 10px; font-size:.8125rem; font-weight:500; min-height:36px}
.lang button.on{background:var(--gold-500); color:var(--green-900)}
/* search */
.search{position:relative; display:flex; align-items:center; background:#fff; border-radius:8px; overflow:hidden; min-height:40px}
.search select{border:none; background:var(--green-50); color:var(--green-900); padding:0 var(--s2); font-family:inherit; font-size:.8125rem; min-height:40px}
.search input{border:none; padding:0 var(--s3); font-family:inherit; font-size:.875rem; min-width:140px; min-height:40px}
.search input:focus{outline:none}
.search-results{position:absolute; top:calc(100% + 6px); right:0; left:0; background:#fff; color:var(--ink-900); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); overflow:hidden; display:none; z-index:70}
.search-results.open{display:block}
.search-results a{display:block; padding:var(--s3); border-bottom:1px solid var(--line); color:var(--ink-900)}
.search-results a:last-child{border-bottom:none}
.search-results a:hover{background:var(--green-50); text-decoration:none}
.search-results .cat{font-size:.75rem; color:var(--ink-600)}
/* hamburger */
.hamburger{display:none; background:transparent; border:none; color:#fff; width:44px; height:44px; font-size:1.5rem}
/* ============ FOOTER ============ */
footer.site{margin-top:var(--s8); background:var(--green-900); color:#E8F2ED; padding:var(--s7) 0 var(--s6)}
footer.site .f-links{display:flex; flex-wrap:wrap; gap:var(--s5); margin-bottom:var(--s5)}
footer.site a{color:#E8F2ED}
footer.site .heritage{border-top:1px solid rgba(255,255,255,.15); padding-top:var(--s4); font-size:.875rem; color:#9DB8AD}
/* ============ RESPONSIVE §6 ============ */
@media(max-width:1024px){
  nav.main a{font-size:.875rem; padding:var(--s2)}
}
@media(max-width:860px){
  .hamburger{display:flex; align-items:center; justify-content:center}
  nav.main{position:absolute; top:60px; left:0; right:0; flex-direction:column; align-items:stretch; gap:0; background:var(--green-900); padding:var(--s2); border-top:1px solid rgba(255,255,255,.15); display:none}
  nav.main.open{display:flex}
  nav.main a{padding:var(--s3)}
  .nav-row{gap:var(--s2)}
}
@media(max-width:600px){
  .search input{min-width:90px}
  .search select{display:none}
  h1{font-size:1.625rem}
}
/* modal (shared — video / generic) */
.modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:100; padding:var(--s4)}
.modal-backdrop.open{display:flex}
.modal{background:#fff; border-radius:var(--radius); max-width:560px; width:100%; padding:var(--s5); box-shadow:var(--shadow)}
.modal h3{margin-bottom:var(--s3)}
.modal .modal-close{float:right; background:transparent; border:none; font-size:1.25rem; color:var(--ink-600); width:32px; height:32px}
.placeholder-media{height:240px; border-radius:8px; background:linear-gradient(135deg,var(--green-900),var(--green-700) 60%,var(--gold-500)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:500}
/* utility */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.gradient-hero{background:linear-gradient(118deg,#0a2d22 0%,var(--green-900) 38%,var(--green-700) 78%,#2d7a59 100%)}
.muted{color:var(--ink-600)}
.text-gold{color:var(--gold-500)}
.flex{display:flex} .between{justify-content:space-between} .center{align-items:center} .wrap{flex-wrap:wrap}
.gap2{gap:var(--s2)} .gap3{gap:var(--s3)} .gap4{gap:var(--s4)}
.grid{display:grid; gap:var(--s4)}
/* ============ P1 LANDING ============ */
.hero{position:relative; border-radius:var(--radius-lg); overflow:hidden; color:#fff; padding:var(--s8) var(--s6); min-height:320px; display:flex; flex-direction:column; justify-content:center}
.hero::after{content:""; position:absolute; inset:0; background:radial-gradient(circle at 88% 18%,rgba(201,162,39,.32),transparent 52%); pointer-events:none}
.hero-motif{position:absolute; right:-40px; bottom:-60px; color:var(--gold-500); opacity:.12; z-index:0; pointer-events:none}
.hero .hero-top{position:relative; z-index:1; max-width:600px}
.hero .eyebrow{display:inline-block; font-size:.8125rem; font-weight:500; letter-spacing:.08em; color:var(--gold-500); margin-bottom:var(--s3); text-transform:uppercase}
.hero h1{color:#fff; margin-bottom:var(--s3); font-size:2.5rem; letter-spacing:-.01em}
.hero p{color:#E8F2ED; font-size:1.0625rem; max-width:500px}
.hero .hero-cta{position:relative; z-index:1; margin-top:var(--s5)}
.btn-lg{min-height:52px; padding:var(--s3) var(--s6); font-size:1.0625rem}
.btn-lg .ico{transition:transform var(--tr)}
.btn-lg:hover .ico{transform:translateX(3px)}
/* today module ⭐ */
.today{border:2px solid var(--gold-500); position:relative; box-shadow:var(--shadow-lg); border-radius:var(--radius-lg)}
.today .today-head{display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:var(--s3); margin-bottom:var(--s4)}
.today .today-title{display:flex; align-items:center; gap:var(--s3); flex-wrap:wrap}
.today .today-title .badge-today{background:var(--gold-500); color:var(--green-900); font-weight:600; padding:2px var(--s3); border-radius:6px; font-size:.8125rem}
.today-meta{display:flex; flex-wrap:wrap; gap:var(--s5); padding:var(--s4) 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); margin-bottom:var(--s4)}
.meta-item{display:flex; align-items:center; gap:var(--s2); font-size:.9375rem}
.meta-item .mi-ico{display:inline-flex; color:var(--green-700); line-height:1}
.meta-item .mi-k{color:var(--ink-600); font-size:.8125rem; display:block}
.meta-item .mi-v{font-weight:500; display:block}
.chips-label{font-size:.875rem; color:var(--ink-600); margin-bottom:var(--s2)}
.chips-row{display:flex; gap:var(--s2); overflow-x:auto; padding-bottom:var(--s2); -webkit-overflow-scrolling:touch}
.chips-row .chip{flex:0 0 auto; font-family:var(--font-mono)}
.chips-row .chip.feat{border-color:var(--gold-500); background:#FBF6E6}
.today-actions{display:flex; flex-wrap:wrap; gap:var(--s3); margin-top:var(--s4)}
/* dual-audience cards */
.dual-grid{display:grid; grid-template-columns:1fr 1fr; gap:var(--s4)}
.audience-card{border-left:5px solid var(--green-700)}
.audience-card.blue{border-left-color:#1565C0}
.audience-card h3{display:flex; align-items:center; gap:var(--s2)}
.audience-card ul{margin-top:var(--s3); display:flex; flex-direction:column; gap:var(--s2)}
.audience-card ul a{display:flex; align-items:center; gap:var(--s2); padding:var(--s2); border-radius:6px}
.audience-card ul a:hover{background:var(--green-50); text-decoration:none}
.audience-card ul a::before{content:"→"; color:var(--green-700)}
/* news */
.news-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:var(--s4)}
.news-card{display:flex; flex-direction:column; overflow:hidden; padding:0}
.news-thumb{height:140px; display:flex; align-items:flex-start; padding:var(--s3)}
.news-body{padding:var(--s4)}
.news-cat{display:inline-block; background:rgba(255,255,255,.9); color:var(--green-900); font-size:.75rem; font-weight:500; padding:2px var(--s2); border-radius:6px}
.news-card h3{font-size:1.0625rem; margin-bottom:var(--s2)}
.section-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--s4)}
@media(max-width:1024px){ .news-grid{grid-template-columns:repeat(2,1fr)} }
@media(max-width:600px){
  .hero{padding:var(--s6) var(--s4); min-height:auto}
  .hero .hero-cta{align-self:stretch}
  .hero .hero-cta .btn{width:100%}
  .dual-grid{grid-template-columns:1fr}
  .news-grid{grid-template-columns:1fr}
  .today-meta{gap:var(--s4)}
}
/* ============ P2 RACE DAY ============ */
.page-head{display:flex; flex-wrap:wrap; align-items:flex-start; justify-content:space-between; gap:var(--s3); margin-bottom:var(--s5)}
.page-head h1{margin-bottom:var(--s1)}
/* conditions panel ⭐ */
.conditions-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--s3)}
.cond-card{background:var(--green-50); border:1px solid var(--line); border-radius:var(--radius-lg); padding:var(--s5) var(--s4); text-align:center; transition:transform var(--tr),box-shadow var(--tr)}
.cond-card:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
.cond-card .cc-ico{display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:50%; background:#fff; color:var(--green-700); line-height:1; margin-bottom:var(--s3)}
.cond-card .cc-label{font-size:.8125rem; color:var(--ink-600); display:flex; align-items:center; justify-content:center; gap:var(--s1); margin-bottom:var(--s1)}
.cond-card .cc-val{font-weight:600; color:var(--green-900); font-size:1.375rem; line-height:1.2}
.cond-card .cc-sub{font-size:.8125rem; color:var(--ink-600); margin-top:2px}
/* race list */
.race-list{display:flex; flex-direction:column; gap:var(--s2)}
.race-row{display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:var(--s4); padding:var(--s3) var(--s4); border:1px solid var(--line); border-radius:var(--radius); background:var(--bg); transition:background var(--tr)}
.race-row:hover{background:var(--bg-alt)}
.race-row.feat{border-color:var(--gold-500); background:#FBF6E6}
.race-row .rr-time{font-family:var(--font-mono); font-weight:600; font-size:1.0625rem; color:var(--green-900); min-width:54px}
.race-row .rr-name{font-weight:500}
.race-row .rr-meta{font-size:.8125rem; color:var(--ink-600); display:flex; flex-wrap:wrap; gap:var(--s3); margin-top:2px}
.race-row .rr-num{font-family:var(--font-mono); display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; background:var(--green-900); color:#fff; font-size:.8125rem; font-weight:600; flex:0 0 auto}
/* runners today */
.runner-tags{display:flex; flex-wrap:wrap; gap:var(--s2)}
.runner-tags a{display:inline-flex; align-items:center; gap:var(--s2); padding:var(--s2) var(--s3); border:1px solid var(--line); border-radius:999px; background:var(--bg); font-size:.9375rem; min-height:40px}
.runner-tags a:hover{background:var(--green-50); border-color:var(--green-700); text-decoration:none}
.runner-tags a .rt-race{font-family:var(--font-mono); font-size:.75rem; color:#fff; background:var(--green-700); border-radius:999px; padding:1px 7px}
/* experience */
.exp-grid{display:grid; grid-template-columns:1fr 1fr; gap:var(--s4)}
.exp-facts{display:flex; flex-direction:column; gap:var(--s3)}
.exp-facts .ef{display:flex; gap:var(--s3); align-items:flex-start}
.exp-facts .ef .ef-ico{display:inline-flex; color:var(--green-700)}
.exp-facts .ef .ef-k{font-weight:500} .exp-facts .ef .ef-v{color:var(--ink-600); font-size:.9375rem}
@media(max-width:1024px){ .conditions-grid{grid-template-columns:repeat(2,1fr)} .exp-grid{grid-template-columns:1fr} }
@media(max-width:600px){
  .conditions-grid{grid-template-columns:repeat(2,1fr)}
  .race-row{grid-template-columns:auto 1fr; row-gap:var(--s2)}
  .race-row .rr-action{grid-column:1/-1}
  .race-row .rr-action .btn{width:100%}
}
/* ============ P3 RACE CARD ============ */
/* race header */
.rc-header .rc-title{display:flex; align-items:baseline; gap:var(--s3); flex-wrap:wrap}
.rc-header .rc-no{font-family:var(--font-mono); background:var(--gold-500); color:var(--green-900); font-weight:600; padding:2px var(--s3); border-radius:8px}
.rc-meta{display:flex; flex-wrap:wrap; gap:var(--s2) var(--s5); margin-top:var(--s3); padding:var(--s3) 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line)}
.rc-meta .rcm{font-size:.9375rem; display:flex; align-items:center; gap:var(--s1)}
.rc-meta .rcm b{color:var(--green-900)}
.rc-meta .rcm .k{color:var(--ink-600)}
.rc-head-actions{display:flex; flex-wrap:wrap; gap:var(--s2); margin-top:var(--s3)}
/* race tabs */
.race-tabs{display:flex; gap:var(--s2); overflow-x:auto; padding:var(--s2) 0; -webkit-overflow-scrolling:touch}
.race-tabs button{flex:0 0 auto; min-width:46px; min-height:44px; border:1px solid var(--line); border-radius:8px; background:#fff; font-family:var(--font-mono); font-weight:600; color:var(--ink-900); transition:all var(--tr)}
.race-tabs button:hover{background:var(--green-50)}
.race-tabs button.on{background:var(--green-900); color:#fff; border-color:var(--green-900)}
.race-tabs button.feat{border-color:var(--gold-500)}
.race-tabs button.feat.on{background:var(--green-900)}
/* view toggle */
.rc-toolbar{display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:var(--s3); margin:var(--s4) 0}
.view-toggle{display:inline-flex; border:1.5px solid var(--green-700); border-radius:9px; overflow:hidden}
.view-toggle button{padding:var(--s2) var(--s5); background:#fff; color:var(--green-700); border:none; min-height:44px; font-weight:600; font-size:.9375rem; transition:all var(--tr)}
.view-toggle button.on{background:var(--green-700); color:#fff}
.note-banner{background:#FBF6E6; border:1px solid var(--gold-500); border-radius:8px; padding:var(--s2) var(--s3); font-size:.875rem; color:#7a5e0a; margin-bottom:var(--s3)}
/* SIMPLE view cards */
.rc-cards{display:grid; grid-template-columns:1fr 1fr; gap:var(--s3)}
.rc-card{border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4); background:var(--bg)}
.rc-card.feat{border-color:var(--gold-500); box-shadow:0 0 0 1px var(--gold-500) inset}
.rc-card-top{display:flex; align-items:center; gap:var(--s3); margin-bottom:var(--s3)}
.rc-num-badge{font-family:var(--font-mono); width:38px; height:38px; border-radius:50%; background:var(--green-900); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; flex:0 0 auto}
.silks{width:26px; height:26px; border-radius:6px; border:1px solid rgba(0,0,0,.18); flex:0 0 auto;
  background:linear-gradient(135deg,var(--sc) 0 43%,rgba(255,255,255,.85) 43% 57%,var(--sc) 57%);
  box-shadow:0 1px 2px rgba(0,0,0,.14)}
.silks-lg{width:32px; height:32px; border-radius:7px}
.rc-name{font-weight:600; font-size:1.0625rem; color:var(--green-700)}
.rc-name:hover{text-decoration:underline}
.rc-name .en{display:block; font-size:.8125rem; color:var(--ink-600); font-weight:400}
.rc-card-grid{display:grid; grid-template-columns:1fr 1fr; gap:var(--s2) var(--s4); font-size:.9375rem}
.rc-kv .k{color:var(--ink-600); font-size:.8125rem; display:flex; align-items:center}
.rc-kv .v{font-weight:500}
.rc-kv .v.mono{font-family:var(--font-mono)}
.rc-form-row{display:flex; align-items:center; gap:var(--s3); margin-top:var(--s3); padding-top:var(--s3); border-top:1px solid var(--line); flex-wrap:wrap}
/* FULL view dense table — frozen 3 cols + sticky header */
.rc-table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius-lg); max-height:70vh; box-shadow:var(--shadow)}
.rc-table{border-collapse:separate; border-spacing:0; min-width:780px; font-size:.9375rem; line-height:1.5}
.rc-table th,.rc-table td{padding:var(--s3) var(--s3); border-bottom:1px solid var(--line); white-space:nowrap; text-align:left}
.rc-table tbody tr:nth-child(odd) td{background:var(--bg)}
.rc-table tbody tr:nth-child(even) td{background:var(--bg-alt)}
.rc-table tbody tr:hover td{background:var(--green-50)}
.rc-table thead th{position:sticky; top:0; z-index:2; background:var(--green-900); color:#fff; font-weight:500; cursor:pointer; user-select:none}
.rc-table thead th:hover{background:#0c3325}
.rc-table th.sortable::after{content:" ⇅"; opacity:.5; font-size:.8em}
.rc-table th.sort-asc::after{content:" ↑"; opacity:1}
.rc-table th.sort-desc::after{content:" ↓"; opacity:1}
.rc-table .num-cell{font-family:var(--font-mono); text-align:right}
.rc-table .form-cell{font-family:var(--font-mono); letter-spacing:2px}
/* frozen columns */
.rc-table .c-num{position:sticky; left:0; z-index:1; width:42px; text-align:center; font-family:var(--font-mono); font-weight:600}
.rc-table .c-silks{position:sticky; left:42px; z-index:1; width:30px; padding:var(--s2)}
.rc-table .c-horse{position:sticky; left:72px; z-index:1; min-width:140px; box-shadow:3px 0 5px -2px rgba(0,0,0,.15)}
.rc-table thead .c-num,.rc-table thead .c-silks,.rc-table thead .c-horse{z-index:4}
.rc-table tbody .c-num,.rc-table tbody .c-silks,.rc-table tbody .c-horse{z-index:1}
.rc-table .c-horse a{color:var(--green-700); font-weight:600}
.rc-table .silks{margin:0 auto}
/* conditional highlight */
.rc-table td.hi{background:#FBF6E6 !important; color:#7a5e0a; font-weight:700}
.delta-up{color:var(--good)} .delta-dn{color:#C62828} .delta-0{color:var(--ink-600)}
/* handicap box */
.handicap-box{background:var(--green-50); border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4)}
.hcap-scale{position:relative; height:10px; border-radius:999px; background:linear-gradient(90deg,var(--bad),var(--warn),var(--good)); margin:var(--s5) 0 var(--s3)}
.hcap-dot{position:absolute; top:50%; width:12px; height:12px; border-radius:50%; background:#fff; border:2px solid var(--green-900); transform:translate(-50%,-50%)}
.hcap-dot.feat{border-color:var(--gold-500); background:var(--gold-500); width:15px; height:15px; z-index:2}
.hcap-ends{display:flex; justify-content:space-between; font-size:.8125rem; color:var(--ink-600); font-family:var(--font-mono)}
/* legend */
.legend details{border:1px solid var(--line); border-radius:var(--radius); padding:var(--s3) var(--s4)}
.legend summary{cursor:pointer; font-weight:500; color:var(--green-700)}
.legend-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:var(--s2); margin-top:var(--s3); font-size:.875rem}
.legend-grid .lg-code{font-family:var(--font-mono); font-weight:600; color:var(--green-900); display:inline-block; min-width:38px}
.gear-legend-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:var(--s2) var(--s4); margin-top:var(--s3); font-size:.875rem}
.gl-row{display:flex; gap:var(--s3); align-items:baseline}
.gl-key{font-family:var(--font-mono); font-weight:600; color:var(--green-900); min-width:34px; flex:0 0 auto}
/* race-card header meta + simple-card bits */
.race-head-meta{display:flex; flex-wrap:wrap; gap:var(--s2) var(--s4); margin-top:var(--s2); font-size:.9375rem; color:var(--ink-600)}
.race-head-meta span{position:relative}
.race-head-meta span+span::before{content:"·"; position:absolute; left:calc(var(--s4)/-2); color:var(--line)}
.race-head-meta .rh-prize{color:var(--green-700); font-weight:600}
.h-inline{margin:0; font-size:1.25rem}
.rc-kv-v{margin-top:2px; font-weight:500}
.form-tag{font-size:.875rem; font-weight:600; padding:2px var(--s2); border-radius:6px}
.form-tag-good{background:#E6F4EA; color:#1B7A3D}
.form-tag-warn{background:#FCF3D9; color:#7a5e0a}
.form-tag-bad{background:#FBE9E7; color:#C62828}
/* ===== P4 HORSE PROFILE ===== */
.horse-hero{display:grid; grid-template-columns:200px 1fr; gap:var(--s5); align-items:center; background:var(--green-50); border:1px solid var(--line); border-radius:var(--radius); padding:var(--s5)}
.horse-photo{aspect-ratio:1; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:3.5rem; color:#fff; box-shadow:inset 0 0 0 4px rgba(255,255,255,.25)}
.horse-id h1{margin:0 0 2px}
.horse-id .en-name{font-size:1.0625rem; color:var(--ink-600); font-family:var(--font-mono)}
.horse-facts{display:flex; flex-wrap:wrap; gap:var(--s2) var(--s4); margin:var(--s3) 0; font-size:.9375rem; color:var(--ink-700)}
.horse-facts span{position:relative}
.horse-facts span+span::before{content:"·"; position:absolute; left:calc(var(--s4)/-2); color:var(--line)}
.rating-badge{display:inline-flex; align-items:baseline; gap:var(--s2); background:var(--green-900); color:#fff; border-radius:10px; padding:var(--s3) var(--s4)}
.rating-badge .rb-num{font-family:var(--font-mono); font-size:1.75rem; font-weight:700; line-height:1}
.rating-badge .rb-lab{font-size:.8125rem; opacity:.85}
/* basic info key-value panel */
.info-grid{display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
.info-grid .kv{display:flex; justify-content:space-between; gap:var(--s3); padding:var(--s3) var(--s4); border-bottom:1px solid var(--line)}
.info-grid .kv:nth-child(odd){border-right:1px solid var(--line)}
.info-grid .kv .k{color:var(--ink-600); font-size:.9375rem}
.info-grid .kv .v{font-weight:500; text-align:right}
/* ===== past performance — dual mode (cards / dense table) ===== */
/* finish badge — color-coded result */
.pp-badge{font-family:var(--font-mono); font-weight:700; display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:24px; padding:0 7px; border-radius:6px}
.pp-badge.b-win{background:#FCF3D9; color:#7a5e0a} .pp-badge.b-place{background:#E6F4EA; color:#1B7A3D}
.pp-badge.b-back{background:var(--bg-alt); color:var(--ink-700)} .pp-badge.b-dnf{background:#FBE9E7; color:#C62828}
/* group filter chips */
.pp-chips{display:flex; flex-wrap:wrap; gap:var(--s2); margin:var(--s3) 0}
.pp-chip{font-size:.875rem; padding:var(--s1) var(--s3); min-height:34px; border-radius:999px; border:1px solid var(--line); background:#fff; color:var(--ink-700); cursor:pointer; transition:all var(--tr)}
.pp-chip:hover{border-color:var(--green-700)}
.pp-chip.on{background:var(--green-50); color:var(--green-900); border-color:var(--green-700); font-weight:600}
.pp-chip.locked{background:var(--bg-alt); color:var(--ink-600); cursor:default; opacity:.9}
/* dense table — frozen first 2 cols + sticky header + horizontal scroll */
.pp-scroll{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius-lg); max-height:70vh; box-shadow:var(--shadow)}
.pp-dense th,.pp-dense td{padding:var(--s3) var(--s3)}
.pp-dense{border-collapse:separate; border-spacing:0; min-width:760px; font-size:.9375rem; line-height:1.5}
.pp-dense th,.pp-dense td{padding:var(--s2) var(--s3); border-bottom:1px solid var(--line); white-space:nowrap; text-align:left}
.pp-dense thead th{position:sticky; top:0; z-index:3; background:var(--green-900); color:#fff; font-weight:500}
.pp-dense .num{text-align:right; font-family:var(--font-mono)}
.pp-dense .fz1{position:sticky; left:0; z-index:2; background:#fff; min-width:78px}
.pp-dense .fz2{position:sticky; left:78px; z-index:2; background:#fff; box-shadow:3px 0 5px -3px rgba(0,0,0,.25)}
.pp-dense thead .fz1,.pp-dense thead .fz2{z-index:4; background:var(--green-900)}
.pp-dense .fz1 a{color:var(--green-700); font-weight:600}
.pp-dense tbody tr:hover td{background:var(--green-50)}
/* cards */
.pp-cards{display:grid; grid-template-columns:1fr 1fr; gap:var(--s3); margin-top:var(--s3)}
.pp-card{border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4); background:var(--bg)}
.pp-card.win{border-color:var(--gold-500); box-shadow:0 0 0 1px var(--gold-500) inset}
.pp-card-top{display:flex; align-items:flex-start; gap:var(--s3)}
.pp-card-h{font-weight:600}
.pp-card-h a{color:var(--green-700)}
.pp-exp{margin-top:var(--s3); font-size:.9375rem; background:transparent; border:none; color:var(--green-700); cursor:pointer; padding:0}
.pp-card-detail{margin-top:var(--s3); padding-top:var(--s3); border-top:1px solid var(--line)}
.pp-grp-h{font-size:.75rem; color:var(--ink-600); letter-spacing:.04em; margin:var(--s3) 0 var(--s1); text-transform:uppercase}
.pp-kv{display:grid; grid-template-columns:1fr 1fr; gap:var(--s2) var(--s4); font-size:.9375rem}
.pp-kv .k{color:var(--ink-600); font-size:.8125rem; display:block}
.pp-comment{line-height:1.6}
/* rating chart */
.rating-chart{border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4); background:var(--bg)}
.rating-chart svg{display:block; width:100%; height:auto; overflow:visible}
.rating-chart .rc-dot{fill:var(--green-700); cursor:pointer; transition:r var(--tr)}
.rating-chart .rc-dot:hover{r:7}
.rc-tip-label{font-family:var(--font-mono); font-size:11px; fill:var(--ink-700)}
/* stewards / related */
.stewards details, .related-box{border:1px solid var(--line); border-radius:var(--radius); padding:var(--s3) var(--s4)}
.stewards summary{cursor:pointer; font-weight:500; color:var(--green-700)}
.steward-item{padding:var(--s2) 0; border-bottom:1px solid var(--line); font-size:.9375rem}
.steward-item:last-child{border-bottom:none}
.related-links{display:flex; flex-wrap:wrap; gap:var(--s2); margin-top:var(--s2)}
.related-links a{display:inline-flex; align-items:center; gap:var(--s2); padding:var(--s2) var(--s3); border:1px solid var(--line); border-radius:999px; color:var(--ink-700); font-size:.9375rem}
.related-links a:hover{background:var(--green-50); border-color:var(--green-700)}
@media(max-width:600px){
  .rc-cards{grid-template-columns:1fr}
  .rc-toolbar{flex-direction:column; align-items:stretch}
  .view-toggle{width:100%} .view-toggle button{flex:1}
  .horse-hero{grid-template-columns:1fr; text-align:center} .horse-photo{max-width:160px; margin:0 auto}
  .horse-facts{justify-content:center}
  .info-grid{grid-template-columns:1fr} .info-grid .kv:nth-child(odd){border-right:none}
  .pp-cards{grid-template-columns:1fr}
}
/* ===== PHASE 3 — micro-interactions, selection, scrollbars, empty state ===== */
/* card hover lift (interactive content cards only) */
.rc-card,.pp-card,.audience-card,.news-card{transition:box-shadow var(--tr),transform var(--tr),border-color var(--tr)}
.rc-card:hover,.pp-card:hover,.audience-card:hover,.news-card:hover{box-shadow:var(--shadow-lg); transform:translateY(-2px)}
.rc-card.feat:hover{box-shadow:var(--shadow-lg),0 0 0 1px var(--gold-500) inset}
.pp-card.win:hover{box-shadow:var(--shadow-lg),0 0 0 1px var(--gold-500) inset}
/* press feedback */
.btn:active{transform:translateY(1px)}
.chip:active,.race-tabs button:active,.view-toggle button:active,.pp-chip:active{transform:translateY(1px)}
/* text selection on-brand */
::selection{background:var(--green-700); color:#fff}
/* slim themed scrollbars on the dense scroll containers */
.rc-table-wrap::-webkit-scrollbar,.pp-scroll::-webkit-scrollbar{height:10px; width:10px}
.rc-table-wrap::-webkit-scrollbar-track,.pp-scroll::-webkit-scrollbar-track{background:transparent}
.rc-table-wrap::-webkit-scrollbar-thumb,.pp-scroll::-webkit-scrollbar-thumb{background:var(--line); border-radius:999px; border:2px solid var(--bg)}
.rc-table-wrap::-webkit-scrollbar-thumb:hover,.pp-scroll::-webkit-scrollbar-thumb:hover{background:var(--ink-600)}
.rc-table-wrap,.pp-scroll{scrollbar-width:thin; scrollbar-color:var(--line) transparent}
/* empty state */
.empty-state{text-align:center; padding:var(--s6) var(--s4); color:var(--ink-600)}
.empty-state .es-ico{color:var(--line); margin-bottom:var(--s3); display:inline-flex}
.empty-state .es-title{font-weight:500; color:var(--ink-900); margin-bottom:var(--s1)}
.search-empty{display:flex; align-items:center; gap:var(--s2); padding:var(--s3) var(--s4); color:var(--ink-600); font-size:.9375rem}
.search-empty .ico{color:var(--ink-600)}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{transition:none !important; animation:none !important}
  .rc-card:hover,.pp-card:hover,.audience-card:hover,.news-card:hover,.cond-card:hover{transform:none}
}
</style>

/* ============ HELPERS ============ */

function icon(name,size){
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox','0 0 24 24'); svg.setAttribute('width',size||20); svg.setAttribute('height',size||20);
  svg.setAttribute('fill','none'); svg.setAttribute('stroke','currentColor');
  svg.setAttribute('stroke-width','1.75'); svg.setAttribute('stroke-linecap','round'); svg.setAttribute('stroke-linejoin','round');
  svg.setAttribute('class','ico'); svg.setAttribute('aria-hidden','true');
  svg.innerHTML=ICON_PATHS[name]||ICON_PATHS.info;
  return svg;
}

/* ============ TOOLTIP HELPER ============ */
function tooltip(text){
  const wrap=el('span',{class:'tip'});
  const btn=el('button',{class:'tip-btn','aria-label':'คำอธิบาย',type:'button'},'?');
  const pop=el('span',{class:'tip-pop',role:'tooltip'},text);
  btn.addEventListener('click',e=>{e.stopPropagation(); const open=wrap.classList.contains('open');
    $$('.tip.open').forEach(t=>t.classList.remove('open')); if(!open)wrap.classList.add('open');});
  wrap.append(btn,pop); return wrap;
}
document.addEventListener('click',()=>$$('.tip.open').forEach(t=>t.classList.remove('open')));

/* ============ MODAL HELPER ============ */
function openModal(title,bodyNode){
  $('#modalTitle').textContent=title; const b=$('#modalBody'); b.innerHTML='';
  b.append(bodyNode); $('#modalBackdrop').classList.add('open');
}
function closeModal(){$('#modalBackdrop').classList.remove('open');}
$('#modalClose').addEventListener('click',closeModal);
$('#modalBackdrop').addEventListener('click',e=>{if(e.target===$('#modalBackdrop'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
/* placeholder feedback (never silent) */
function placeholder(msg){openModal('ตัวอย่าง (Prototype)',el('p',{class:'muted'},msg));}

/* ============ ROUTER ============ */
const PAGES=['landing','raceday','racecard','horse'];
const RENDERERS={}; // each page registers RENDERERS[id]=fn
const RENDERED={};
function showPage(id,opts){
  if(!PAGES.includes(id))id='landing';
  $$('.page').forEach(p=>p.classList.remove('active'));
  const sec=document.getElementById(id);
  // (re)render — pages may re-render when opts change (e.g. race no.)
  if(RENDERERS[id]){RENDERERS[id](sec,opts||{}); RENDERED[id]=true;}
  else if(!RENDERED[id]){sec.innerHTML='<p class="muted">(หน้านี้กำลังพัฒนา)</p>';}
  setLang(document.documentElement.getAttribute('data-lang')||'th'); // re-localize freshly rendered nodes
  sec.classList.add('active');
  // nav active state
  $$('nav.main a[data-go]').forEach(a=>a.classList.toggle('active',a.dataset.go===id));
  $('#mainNav').classList.remove('open'); $('#hamburger').setAttribute('aria-expanded','false');
  window.scrollTo(0,0);
}
/* parse hash like #racecard?no=3 */
function parseHash(){
  const raw=location.hash.slice(1)||'landing';
  const [id,qs]=raw.split('?'); const opts={};
  if(qs)qs.split('&').forEach(p=>{const[k,v]=p.split('='); opts[k]=decodeURIComponent(v||'');});
  return {id,opts};
}
function route(){const{id,opts}=parseHash(); showPage(id,opts);}
window.addEventListener('hashchange',route);
/* nav helper: navigate programmatically */
function go(id,opts){let h='#'+id;
  if(opts&&Object.keys(opts).length)h+='?'+Object.entries(opts).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  location.hash=h;}

/* ============ SEARCH (mock dropdown) ============ */
function runSearch(){
  const q=$('#searchInput').value.trim().toLowerCase();
  const cat=$('#searchCat').value; const box=$('#searchResults');
  if(!q){box.classList.remove('open'); box.innerHTML=''; return;}
  let items=DATA.searchMock||[];
  items=items.filter(i=>(cat==='all'||i.type===cat)&&(i.name.toLowerCase().includes(q)||(i.sub||'').toLowerCase().includes(q)));
  box.innerHTML='';
  if(!items.length){box.append(el('div',{class:'search-empty'}, icon('search-off',18), el('span',{},'ไม่พบผลลัพธ์สำหรับ "'+q+'"')));}
  else items.slice(0,5).forEach(i=>{
    const a=el('a',{href:'#'},el('div',{},i.name),el('div',{class:'cat'},i.label||i.type));
    a.addEventListener('click',ev=>{ev.preventDefault(); box.classList.remove('open'); $('#searchInput').value='';
      if(i.go)go(i.go,i.opts); });
    box.append(a);
  });
  box.classList.add('open');
}

/* breadcrumb — items:[{t,go?,opts?,dead?}|{t,current:true}] */

/* form digits: 1-9 = finishing position, 0 = 10th+. latest is rightmost. */
function formSegClass(d){const n=+d; if(n>=1&&n<=3)return 'g'; if(n>=4&&n<=6)return 'w'; return 'b';}
function formBar(form){
  const bar=el('span',{class:'form-bar','aria-label':'ฟอร์ม 6 รอบล่าสุด: '+form});
  for(const ch of String(form))bar.append(el('span',{class:formSegClass(ch),title:(ch==='0'?'ที่ 10+':'ที่ '+ch)}));
  return bar;
}
/* lower score = better form (0 counts as 10th). used for "best form in race" highlight */
function formScore(form){const ds=String(form).split('').map(c=>c==='0'?10:+c); return ds.reduce((a,b)=>a+b,0)/ds.length;}
function formTagLabel(tag){return {good:'ฟอร์มดี',warn:'กำลังพัฒนา',bad:'ห่างหาย'}[tag]||'—';}
function deltaSpan(d){const cls=d>0?'delta-up':(d<0?'delta-dn':'delta-0'); const txt=d>0?'+'+d:(d<0?String(d):'0'); return el('span',{class:cls},txt);}

function renderFull(runners,topRating,bestForm,rerender){

    {key:'jockey', label:'จ็อกกี้'},

      el('td',{class:'num-cell'+(isTopR?' hi':'')}, String(r.rating)),
      el('td',{class:'num-cell'}, deltaSpan(r.ratingDelta)),
      el('td',{class:'num-cell'}, String(r.daysSince)),
      el('td',{}, r.gear)));

  table.append(tb); wrap.append(table);

  return el('div',{}, wrap, hint);

function ppPosBadge(f){
  if(f.pos===0||f.pos==null)return el('span',{class:'pp-badge b-dnf'},'DNF');
  const cls=f.pos===1?'b-win':(f.pos<=3?'b-place':'b-back');
  return el('span',{}, el('span',{class:'pp-badge '+cls}, String(f.pos)), el('span',{class:'muted small'},'/'+f.field));
}
function ppVal(f,key){
  if(key==='finish')return ppPosBadge(f);
  if(key==='prizeOwner'||key==='prizeHorse')return f[key]?Number(f[key]).toLocaleString():'–';
  const v=f[key]; return (v==null||v==='')?'–':String(v);
}
function ppDateLink(f){const a=el('a',{href:'#'},f.date); a.addEventListener('click',e=>{e.preventDefault(); e.stopPropagation(); go('raceday');}); return a;}

    const a=el('a',{href:'#'}, r.label, el('span',{class:'badge-demo'},'demo'));
    a.addEventListener('click',e=>{e.preventDefault(); placeholder('โปรไฟล์ "'+r.label+'" อยู่นอกขอบเขต prototype (ทำเฉพาะโปรไฟล์ม้า)');});
    links.append(a);
  });
  rel.append(links); sec.append(rel);
};

/* simple responsive SVG rating line — viewBox-based so it scales */
function ratingSVG(data){
  const W=600,H=180,pad=34;
  const min=Math.min(...data)-2, max=Math.max(...data)+2;
  const x=i=>pad+(i*(W-pad*2)/(data.length-1));
  const y=v=>H-pad-((v-min)/(max-min))*(H-pad*2);
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('role','img');
  svg.setAttribute('aria-label','กราฟเรตติ้ง 8 การแข่งล่าสุด ค่าล่าสุด '+data[data.length-1]);
  const mk=(t,a)=>{const n=document.createElementNS(NS,t); for(const k in a)n.setAttribute(k,a[k]); return n;};
  /* gridlines */
  [min,(min+max)/2,max].forEach(v=>{
    svg.append(mk('line',{x1:pad,y1:y(v),x2:W-pad,y2:y(v),stroke:'#e2e6e1','stroke-width':1}));
    const lbl=mk('text',{x:pad-6,y:y(v)+4,'text-anchor':'end',class:'rc-tip-label'}); lbl.textContent=Math.round(v); svg.append(lbl);
  });
  /* line path */
  const d=data.map((v,i)=>(i?'L':'M')+x(i)+' '+y(v)).join(' ');
  svg.append(mk('path',{d,fill:'none',stroke:'var(--green-700)','stroke-width':2.5,'stroke-linejoin':'round'}));
  /* dots + value labels on click */
  data.forEach((v,i)=>{
    const c=mk('circle',{cx:x(i),cy:y(v),r:4.5,class:'rc-dot'});
    const t=mk('text',{x:x(i),y:y(v)-12,'text-anchor':'middle',class:'rc-tip-label',style:'display:none'}); t.textContent=v;
    c.addEventListener('click',()=>{const vis=t.style.display!=='none'; svg.querySelectorAll('text.rc-tip-label[data-dot]').forEach(e=>e.style.display='none'); t.style.display=vis?'none':'block';});
    t.setAttribute('data-dot','1');
    svg.append(c,t);
  });
  return svg;
}
