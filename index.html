<!DOCTYPE html>
<html lang="th" data-lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRC Racing — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Serif+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ §3 DESIGN TOKENS ============ */
:root{
  /* spacing — 4px grid */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px; --s8:64px;
  /* color — navy/gold. var names kept "green-*" but hold navy now */
  --green-900:#264068; --green-700:#30528A; --green-50:#EAEEF5;
  --gold-500:#BF942D;
  --ink-900:#1A1A1A; --ink-600:#5C5C5C; --line:#D9D5CF;
  --bg:#FFFFFF; --bg-alt:#F6F5F3;
  --good:#2E7D32; --warn:#ED6C02; --bad:#9E9E9E;
  /* tint fills (replace ad-hoc pastels — chips, status, selected rows) */
  --tint-gold:#FBF1D6; --tint-green:#E6F4EA; --tint-warn:#FDF0E3; --tint-sel:#FBF6E6;
  /* type */
  --font-ui:"Noto Serif Thai",Georgia,"Times New Roman",serif;
  --font-mono:"IBM Plex Mono","SF Mono",ui-monospace,monospace;
  /* motion */
  --tr:0.18s ease;
  --maxw:1200px;
  --radius:10px;
  --radius-lg:14px;
  --shadow:0 1px 3px rgba(38,64,104,.10),0 4px 12px rgba(38,64,104,.08);
  --shadow-lg:0 2px 6px rgba(38,64,104,.12),0 12px 32px rgba(38,64,104,.12);
}
/* ============ BASE / RESET ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-ui); font-weight:400; font-size:1rem;
  line-height:1.6; color:var(--ink-900); background:var(--bg);
  -webkit-font-smoothing:antialiased; overflow-x:clip;
}
h1,h2,h3{line-height:1.3; font-weight:600; color:var(--green-900)}
h1{font-size:2rem} h2{font-size:1.5rem} h3{font-size:1.25rem}
small,.small{font-size:.875rem}
a{color:var(--green-700); text-decoration:none}
a:hover{text-decoration:underline}
ul{list-style:none}
img{max-width:100%; display:block}
button{font-family:inherit; cursor:pointer}
.mono{font-family:var(--font-mono); font-variant-numeric:tabular-nums}
/* visible focus ring everywhere */
:focus-visible{outline:3px solid var(--gold-500); outline-offset:2px; border-radius:4px}
.ico{display:inline-block; vertical-align:-.18em; flex:0 0 auto}
/* ============ LAYOUT ============ */
.container{max-width:var(--maxw); margin:0 auto; padding:0 var(--s5)}
.page{display:none; padding-top:var(--s6); padding-bottom:var(--s8)}
.page.active{display:block; animation:fade var(--tr)}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.section-gap{margin-top:var(--s7)}
/* ============ SHARED COMPONENTS ============ */
/* buttons — touch target ≥44px */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:var(--s2);
  min-height:44px; padding:var(--s2) var(--s5); border:1px solid transparent;
  border-radius:8px; font-size:1rem; font-weight:500; line-height:1.2;
  transition:background var(--tr),border-color var(--tr),color var(--tr);
}
.btn-primary{background:var(--green-700); color:#fff}
.btn-primary:hover{background:var(--green-900); text-decoration:none}
.btn-gold{background:var(--gold-500); color:#1A1A1A}
.btn-gold:hover{background:#A37D20; text-decoration:none}
.btn-ghost{background:transparent; color:var(--green-700); border-color:var(--line)}
.btn-ghost:hover{background:var(--green-50); text-decoration:none}
.btn-sm{min-height:44px; padding:var(--s1) var(--s3); font-size:.875rem}
/* cards */
.card{background:var(--bg); border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4); box-shadow:var(--shadow)}
.card-flat{background:var(--bg-alt); border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4)}
/* chips */
.chip{display:inline-flex; align-items:center; justify-content:center; min-width:40px; min-height:40px; padding:var(--s1) var(--s3); border-radius:999px; border:1px solid var(--line); background:var(--bg); font-weight:500; font-size:.9375rem; transition:all var(--tr)}
.chip:hover{background:var(--green-50); border-color:var(--green-700); text-decoration:none}
.chip-status{min-height:28px; padding:2px var(--s3); font-size:.8125rem; font-weight:500; border:none}
.chip-upcoming{background:var(--green-50); color:var(--green-900)}
.chip-live{background:#FDECEA; color:#C62828}
.chip-done{background:#EEE; color:var(--ink-600)}
/* breadcrumb */
.breadcrumb{display:flex; flex-wrap:wrap; align-items:center; gap:var(--s2); font-size:.875rem; color:var(--ink-600); margin-bottom:var(--s4)}
.breadcrumb a{color:var(--ink-600)}
.breadcrumb a:hover{color:var(--green-700)}
.breadcrumb .sep{opacity:.5}
.breadcrumb .current{color:var(--ink-900); font-weight:500}
/* tables */
table{border-collapse:collapse; width:100%; font-size:.9375rem; line-height:1.5}
th,td{padding:var(--s3); text-align:left; border-bottom:1px solid var(--line)}
thead th{background:var(--green-900); color:#fff; font-weight:500; white-space:nowrap}
tbody tr:nth-child(even){background:var(--bg-alt)}
/* tooltip */
.tip{position:relative; display:inline-flex; align-items:center}
.tip-btn{display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; border:1px solid var(--ink-600); background:transparent; color:var(--ink-600); font-size:.75rem; font-weight:600; line-height:1; margin-left:var(--s1)}
.tip-btn:hover,.tip-btn:focus-visible{background:var(--green-700); color:#fff; border-color:var(--green-700)}
.tip-pop{position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); z-index:60; width:max-content; max-width:240px; padding:var(--s2) var(--s3); background:var(--ink-900); color:#fff; font-size:.8125rem; font-weight:400; line-height:1.5; border-radius:8px; box-shadow:var(--shadow); opacity:0; visibility:hidden; transition:opacity var(--tr)}
.tip-pop::after{content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:var(--ink-900)}
.tip.open .tip-pop{opacity:1; visibility:visible}
/* demo / dead-link badge */
.badge-demo{display:inline-block; padding:1px var(--s2); font-size:.6875rem; font-weight:500; border-radius:4px; background:var(--green-50); color:var(--green-900); margin-left:var(--s1)}
.badge-feat{display:inline-flex; align-items:center; gap:3px; padding:1px var(--s2); font-size:.6875rem; font-weight:600; border-radius:4px; background:var(--gold-500); color:var(--green-900); margin-left:var(--s2)}
.inline-link{display:inline-flex; align-items:center; gap:var(--s1)}
.inline-link .ico{transition:transform var(--tr)}
.inline-link:hover .ico{transform:translateX(3px)}
.scroll-hint{display:flex; align-items:center; gap:var(--s1)}
.scroll-hint .ico{color:var(--green-700)}
.dead{color:var(--ink-600); cursor:not-allowed}
/* form traffic-light */
.form-bar{display:inline-flex; gap:3px}
.form-bar span{width:10px; height:18px; border-radius:2px; background:var(--bad)}
.form-bar span.g{background:var(--good)} .form-bar span.w{background:var(--warn)} .form-bar span.b{background:var(--bad)}
.tag{display:inline-block; padding:2px var(--s2); border-radius:6px; font-size:.8125rem; font-weight:500}
.tag-good{background:var(--tint-green); color:var(--good)} .tag-warn{background:var(--tint-warn); color:var(--warn)} .tag-bad{background:#EEE; color:var(--ink-600)}
/* ============ HEADER / NAV ============ */
header.site{position:sticky; top:0; z-index:50; background:var(--green-900); color:#fff; box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nav-row{display:flex; align-items:center; gap:var(--s3); min-height:60px}
.logo{display:flex; align-items:center; gap:var(--s2); color:#fff; font-weight:600; font-size:1.0625rem; white-space:nowrap; margin-right:var(--s2)}
.logo:hover{text-decoration:none; opacity:.9}
.logo .mark{width:34px; height:34px; border-radius:50%; background:var(--gold-500); color:var(--green-900); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.72rem; flex:0 0 auto}
nav.main{display:flex; align-items:center; gap:2px; flex:1}
nav.main a{color:#E8F2ED; padding:var(--s2) 10px; border-radius:6px; font-size:.875rem; font-weight:500; white-space:nowrap; transition:background var(--tr)}
nav.main a:hover{background:rgba(255,255,255,.12); text-decoration:none}
nav.main a.active{background:var(--green-700); color:#fff}
nav.main a.dead{color:#9DB8AD}
.nav-tools{display:flex; align-items:center; gap:var(--s2)}
/* live stream button (desktop) + menu link (mobile) */
.btn-live{display:inline-flex; align-items:center; gap:6px; background:var(--gold-500); color:var(--green-900); border:none; border-radius:8px; padding:var(--s2) var(--s3); min-height:40px; font-family:inherit; font-size:.8125rem; font-weight:700; cursor:pointer; transition:filter var(--tr)}
.btn-live:hover{filter:brightness(1.06)}
.live-dot{width:8px; height:8px; border-radius:50%; background:#C0392B; flex:0 0 auto; box-shadow:0 0 0 0 rgba(192,57,43,.6); animation:livePulse 1.8s ease-out infinite}
@keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.5)}70%{box-shadow:0 0 0 6px rgba(192,57,43,0)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
.nav-live{display:none; align-items:center; gap:8px; color:var(--gold-500) !important; font-weight:600}
.nav-live .live-dot{box-shadow:none; animation:none}
/* nav dropdown (Horses & People) */
.nav-dropdown{position:relative; display:inline-flex}
.nav-dd-toggle{display:inline-flex; align-items:center; gap:4px}
.dropdown-menu{position:absolute; top:100%; left:0; min-width:200px; background:#fff; border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow-lg); padding:var(--s2); display:none; z-index:80}
.nav-dropdown:hover .dropdown-menu,.nav-dropdown:focus-within .dropdown-menu{display:block}
.dropdown-menu a{display:block; padding:var(--s3); border-radius:8px; color:var(--ink-900) !important; font-size:.9375rem; white-space:nowrap}
.dropdown-menu a:hover{background:var(--green-50); text-decoration:none}
/* lang toggle */
.lang{display:flex; border:1px solid rgba(255,255,255,.3); border-radius:6px; overflow:hidden}
.lang button{background:transparent; color:#E8F2ED; border:none; padding:6px 10px; font-size:.8125rem; font-weight:500; min-height:36px}
.lang button.on{background:var(--gold-500); color:var(--green-900)}
/* search — collapsed icon → expanding panel */
.search{position:relative; display:flex; align-items:center}
.search-toggle{display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:8px; background:rgba(255,255,255,.12); color:#fff; border:none; transition:background var(--tr),color var(--tr)}
.search-toggle:hover{background:rgba(255,255,255,.22)}
.search.open .search-toggle{background:var(--gold-500); color:var(--green-900)}
.search-panel{position:absolute; top:calc(100% + 10px); right:0; width:320px; max-width:calc(100vw - 32px); background:#fff; color:var(--ink-900); border-radius:10px; box-shadow:var(--shadow-lg); padding:var(--s3); display:none; z-index:70}
.search.open .search-panel{display:block}
.search-panel input{width:100%; border:1px solid var(--line); border-radius:8px; padding:0 var(--s3); height:44px; font-family:inherit; font-size:.95rem; color:var(--ink-900)}
.search-panel input:focus{outline:none; border-color:var(--green-700)}
.search-results{margin-top:var(--s2); max-height:320px; overflow:auto}
.search-results a{display:block; padding:var(--s3); border-bottom:1px solid var(--line); color:var(--ink-900)}
.search-results a:last-child{border-bottom:none}
.search-results a:hover{background:var(--green-50); text-decoration:none}
.search-results .cat{font-size:.75rem; color:var(--ink-600)}
/* hamburger */
.hamburger{display:none; background:transparent; border:none; color:#fff; width:44px; height:44px; font-size:1.5rem}
/* ============ FOOTER ============ */
footer.site{margin-top:var(--s8); background:var(--green-900); color:#E8F2ED; padding:var(--s7) 0 var(--s6)}
footer.site .f-links{display:flex; flex-wrap:wrap; gap:var(--s5); margin-bottom:var(--s5)}
footer.site a{color:#E8F2ED}
footer.site .heritage{border-top:1px solid rgba(255,255,255,.15); padding-top:var(--s4); font-size:.875rem; color:#9DB8AD}
/* ============ RESPONSIVE §6 ============ */
@media(max-width:1024px){
  .hamburger{display:flex; align-items:center; justify-content:center; margin-left:auto}
  nav.main{position:absolute; top:60px; left:0; right:0; flex-direction:column; align-items:stretch; gap:0; background:var(--green-900); padding:var(--s2); border-top:1px solid rgba(255,255,255,.15); display:none; z-index:60}
  nav.main.open{display:flex}
  nav.main a{padding:var(--s3); font-size:1rem}
  .nav-row{gap:var(--s2)}
  .btn-live{display:none}                 /* collapses into the hamburger menu */
  .nav-live{display:flex}
  .nav-dropdown{display:block}
  .nav-dd-toggle{display:none}            /* parent label redundant in the sheet */
  .dropdown-menu{position:static; display:block; box-shadow:none; border:none; padding:0; min-width:0; background:transparent}
  .dropdown-menu a{color:#E8F2ED !important; padding:var(--s3) var(--s3) var(--s3) var(--s5)}
  .dropdown-menu a:hover{background:rgba(255,255,255,.12)}
}
@media(max-width:600px){
  .container{padding:0 var(--s4)}
  .search-panel{position:fixed; top:64px; left:var(--s4); right:var(--s4); width:auto; max-width:none}
  h1{font-size:1.625rem}
}
/* modal (shared — video / generic) */
.modal-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:100; padding:var(--s4)}
.modal-backdrop.open{display:flex}
.modal{background:#fff; border-radius:var(--radius); max-width:560px; width:100%; padding:var(--s5); box-shadow:var(--shadow)}
.modal h3{margin-bottom:var(--s3)}
.modal .modal-close{float:right; background:transparent; border:none; font-size:1.25rem; color:var(--ink-600); width:32px; height:32px}
.placeholder-media{height:240px; border-radius:8px; background:linear-gradient(135deg,var(--green-900),var(--green-700) 60%,var(--gold-500)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:500}
/* photo card (image fills, caption overlay) */
.photo-card{position:relative; padding:0; overflow:hidden; min-height:200px}
.photo-card img{width:100%; height:100%; min-height:200px; object-fit:cover}
.photo-caption{position:absolute; left:var(--s3); bottom:var(--s3); display:inline-flex; align-items:center; gap:var(--s1); background:rgba(38,64,104,.85); color:#fff; font-size:.8125rem; font-weight:500; padding:var(--s1) var(--s3); border-radius:999px; backdrop-filter:blur(2px)}
/* utility */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.gradient-hero{background:linear-gradient(118deg,#1a2d4d 0%,var(--green-900) 38%,var(--green-700) 78%,#3a5d96 100%)}
.muted{color:var(--ink-600)}
.text-gold{color:var(--gold-500)}
.flex{display:flex} .between{justify-content:space-between} .center{align-items:center} .wrap{flex-wrap:wrap}
.gap2{gap:var(--s2)} .gap3{gap:var(--s3)} .gap4{gap:var(--s4)}
.grid{display:grid; gap:var(--s4)}
/* ============ P1 LANDING ============ */
.hero{position:relative; overflow:hidden; color:#fff; min-height:540px; display:flex; align-items:center; background-color:var(--green-900); background-size:cover; background-position:center}
.hero::after{content:""; position:absolute; inset:0; background:radial-gradient(circle at 88% 18%,rgba(201,162,39,.32),transparent 52%); pointer-events:none}
.hero-motif{position:absolute; right:-40px; bottom:-60px; color:var(--gold-500); opacity:.12; z-index:0; pointer-events:none}
.hero .hero-top{position:relative; z-index:1; max-width:600px}
.hero .eyebrow{display:inline-block; font-size:.8125rem; font-weight:500; letter-spacing:.08em; color:var(--gold-500); margin-bottom:var(--s3); text-transform:uppercase}
.hero h1{color:#fff; margin-bottom:var(--s3); font-size:2.5rem; letter-spacing:-.01em}
.hero p{color:#E8F2ED; font-size:1.0625rem; max-width:500px}
.hero .hero-cta{position:relative; z-index:1; margin-top:var(--s5)}
.btn-lg{min-height:52px; padding:var(--s3) var(--s6); font-size:1.0625rem}
.btn-lg .ico{transition:transform var(--tr)}
.btn-lg:hover .ico{transform:translateX(3px)}
/* today module ⭐ */
.today{border:2px solid var(--gold-500); position:relative; box-shadow:var(--shadow-lg); border-radius:var(--radius-lg)}
.today .today-head{display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:var(--s3); margin-bottom:var(--s4)}
.today .today-title{display:flex; align-items:center; gap:var(--s3); flex-wrap:wrap}
.today .today-title .badge-today{background:var(--gold-500); color:var(--green-900); font-weight:600; padding:2px var(--s3); border-radius:6px; font-size:.8125rem}
.today-meta{display:flex; flex-wrap:wrap; gap:var(--s5); padding:var(--s4) 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); margin-bottom:var(--s4)}
.meta-item{display:flex; align-items:center; gap:var(--s2); font-size:.9375rem}
.meta-item .mi-ico{display:inline-flex; color:var(--green-700); line-height:1}
.meta-item .mi-k{color:var(--ink-600); font-size:.8125rem; display:block}
.meta-item .mi-v{font-weight:500; display:block}
.chips-label{font-size:.875rem; color:var(--ink-600); margin-bottom:var(--s2)}
.chips-row{display:flex; gap:var(--s2); overflow-x:auto; padding-bottom:var(--s2); -webkit-overflow-scrolling:touch}
.chips-row .chip{flex:0 0 auto; font-family:var(--font-mono)}
.chips-row .chip.feat{border-color:var(--gold-500); background:var(--tint-sel)}
.today-actions{display:flex; flex-wrap:wrap; gap:var(--s3); margin-top:var(--s4)}
/* dual-audience cards */
.dual-grid{display:grid; grid-template-columns:1fr 1fr; gap:var(--s4)}
.audience-card{border-left:5px solid var(--green-700)}
.audience-card.blue{border-left-color:#1565C0}
.audience-card h3{display:flex; align-items:center; gap:var(--s2)}
.audience-card ul{margin-top:var(--s3); display:flex; flex-direction:column; gap:var(--s2)}
.audience-card ul a{display:flex; align-items:center; gap:var(--s2); padding:var(--s2); border-radius:6px}
.audience-card ul a:hover{background:var(--green-50); text-decoration:none}
.audience-card ul a::before{content:"→"; color:var(--green-700)}
/* news */
.news-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:var(--s4)}
.news-card{display:flex; flex-direction:column; overflow:hidden; padding:0}
.news-thumb{position:relative; height:160px; overflow:hidden}
.news-thumb img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform var(--tr)}
.news-card:hover .news-thumb img{transform:scale(1.05)}
.news-body{padding:var(--s4)}
.news-cat{position:absolute; top:var(--s3); left:var(--s3); z-index:1; display:inline-block; background:rgba(255,255,255,.92); color:var(--green-900); font-size:.75rem; font-weight:600; padding:3px var(--s2); border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.18)}
.news-card h3{font-size:1.0625rem; margin-bottom:var(--s2)}
.section-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--s4)}
@media(max-width:1024px){ .news-grid{grid-template-columns:repeat(2,1fr)} }
@media(max-width:600px){
  .dual-grid{grid-template-columns:1fr}
  .news-grid{grid-template-columns:1fr}
}
/* ---- quick-access shortcut grid (Selangor-inspired) ---- */
.shortcut-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--s3); margin-top:var(--s4)}
.shortcut{position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--s2); text-align:center; padding:var(--s5) var(--s3); background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-lg); color:var(--ink-900); transition:transform var(--tr),box-shadow var(--tr),border-color var(--tr); cursor:pointer}
.shortcut:hover{transform:translateY(-3px); box-shadow:var(--shadow-lg); border-color:transparent; text-decoration:none}
.shortcut .sc-disc{display:inline-flex; align-items:center; justify-content:center; width:52px; height:52px; border-radius:50%; color:#fff}
.shortcut .sc-th{font-weight:600; font-size:.9375rem; color:var(--green-900); line-height:1.25}
.shortcut .sc-en{font-size:.75rem; color:var(--ink-600)}
.shortcut .sc-soon{position:absolute; top:var(--s2); right:var(--s2); font-size:.625rem; font-weight:600; padding:1px 6px; border-radius:999px; background:var(--bg-alt); color:var(--ink-600); border:1px solid var(--line)}
.shortcut.is-soon{opacity:.92}
.shortcut.is-live .sc-th::after{content:""}
/* ---- home two-column: fixtures + news ---- */
.home-cols{display:grid; grid-template-columns:minmax(280px,1fr) 1.4fr; gap:var(--s5); align-items:start; margin-top:var(--s4)}
/* fixtures list */
.fixtures{display:flex; flex-direction:column; gap:var(--s2)}
.fixture{display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:var(--s3); padding:var(--s3); border:1px solid var(--line); border-radius:var(--radius); background:var(--bg); transition:background var(--tr),border-color var(--tr)}
.fixture:hover{background:var(--bg-alt)}
.fixture.today{border-color:var(--gold-500); background:var(--tint-sel)}
.fx-date{display:flex; flex-direction:column; align-items:center; justify-content:center; width:54px; height:54px; border-radius:var(--radius); background:var(--green-900); color:#fff; line-height:1; flex:0 0 auto}
.fixture.today .fx-date{background:var(--gold-500); color:var(--green-900)}
.fx-date .fx-dd{font-family:var(--font-mono); font-size:1.375rem; font-weight:700}
.fx-date .fx-mon{font-size:.6875rem; margin-top:2px}
.fx-name{font-weight:600; color:var(--green-900)}
.fx-meta{font-size:.8125rem; color:var(--ink-600); display:flex; flex-wrap:wrap; gap:var(--s1) var(--s3); margin-top:2px}
.fx-meta span{display:inline-flex; align-items:center; gap:4px}
.fx-action .btn{white-space:nowrap}
/* news list */
.news-list{display:flex; flex-direction:column; gap:var(--s3)}
.news-item{display:grid; grid-template-columns:96px 1fr; gap:var(--s3); padding:var(--s2); border-radius:var(--radius); border:1px solid transparent; transition:background var(--tr),border-color var(--tr); cursor:pointer; align-items:start}
.news-item:hover{background:var(--bg-alt); border-color:var(--line); text-decoration:none}
.news-item.feature{grid-template-columns:1fr; gap:var(--s3); padding:0; border:1px solid var(--line); overflow:hidden; background:var(--bg)}
.ni-thumb{position:relative; border-radius:8px; overflow:hidden; aspect-ratio:16/10}
.news-item.feature .ni-thumb{border-radius:0; aspect-ratio:16/8}
.ni-thumb img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform var(--tr)}
.news-item:hover .ni-thumb img{transform:scale(1.05)}
.ni-cat{display:inline-block; font-size:.6875rem; font-weight:600; color:var(--green-900); background:var(--green-50); padding:2px var(--s2); border-radius:6px}
.news-item.feature .ni-cat{position:absolute; top:var(--s3); left:var(--s3); background:rgba(255,255,255,.92); box-shadow:0 1px 4px rgba(0,0,0,.18)}
.news-item.feature .ni-body{padding:var(--s4)}
.ni-title{font-size:.9375rem; font-weight:600; color:var(--green-900); line-height:1.35; margin:var(--s1) 0}
.news-item.feature .ni-title{font-size:1.1875rem}
.ni-ex{font-size:.8125rem; color:var(--ink-600); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.ni-date{font-size:.75rem; color:var(--ink-600); display:inline-flex; align-items:center; gap:4px; margin-top:var(--s1)}
/* hero — full-bleed banner (today card + next strip live inside) */
.hero-wrap{position:relative; width:var(--vw,100vw); margin-left:calc(50% - var(--vw,100vw)/2); margin-right:calc(50% - var(--vw,100vw)/2); margin-top:calc(var(--s6)*-1); overflow:hidden}
.hero-inner{position:relative; z-index:1; width:100%; max-width:var(--maxw); margin:0 auto; padding:var(--s7) var(--s5); display:grid; grid-template-columns:minmax(0,1.12fr) minmax(0,.88fr); gap:var(--s5) var(--s7); align-items:center}
.hero-lead{min-width:0}
.hero-lead-vp{overflow:hidden}
.hero-lead-slider{display:flex; transition:transform .5s cubic-bezier(.4,0,.2,1); will-change:transform}
.hero-lead-slide{flex:0 0 100%; min-width:0}
.hero-dots{display:flex; gap:6px; align-items:center; margin-top:var(--s5)}
.hero-dot{width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.35); border:1px solid rgba(255,255,255,.5); cursor:pointer; padding:0; transition:all .3s; flex-shrink:0}
.hero-dot.on{background:#fff; width:22px; border-radius:4px}
/* today card floating over hero */
.hero-today{background:rgba(255,255,255,.98); border-radius:var(--radius-lg); padding:var(--s5); box-shadow:0 20px 52px -14px rgba(0,0,0,.5); color:var(--ink-900)}
.hero-today .ht-head{display:flex; align-items:center; justify-content:space-between; gap:var(--s2); flex-wrap:wrap; margin-bottom:var(--s3)}
.hero-today .badge-today{background:var(--gold-500); color:var(--green-900); font-weight:700; padding:3px var(--s3); border-radius:6px; font-size:.8125rem}
.hero-today .ht-track{font-size:1.1875rem; color:var(--green-900); margin-bottom:2px}
.hero-today .ht-sub{font-size:.8125rem; color:var(--ink-600)}
.hero-today .ht-meta{display:grid; grid-template-columns:1fr 1fr; gap:var(--s3); padding:var(--s4) 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); margin:var(--s3) 0}
.hero-today .ht-meta .mi-k{font-size:.6875rem}
.hero-today .ht-meta .mi-v{font-size:.875rem}
.hero-today .ht-chips-label{font-size:.75rem; color:var(--ink-600); margin-bottom:var(--s2)}
.hero-today .today-actions{margin-top:var(--s4)}
.hero-today .today-actions .btn{width:100%}
/* next-days strip along the bottom of the hero */
.hero-next{grid-column:1 / -1; margin-top:var(--s3); padding-top:var(--s5); border-top:1px solid rgba(255,255,255,.18); display:flex; align-items:center; gap:var(--s4)}
.hn-label{color:#fff; font-weight:600; font-size:.9375rem; display:flex; align-items:center; gap:var(--s2); white-space:nowrap}
.hn-label .ico{color:var(--gold-500)}
.hn-pills{display:flex; gap:var(--s3); overflow-x:auto; flex:1 1 0; min-width:0; padding-bottom:2px; -webkit-overflow-scrolling:touch}
.hn-pill{flex:0 0 auto; display:flex; align-items:center; gap:var(--s2); background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.25); border-radius:999px; padding:var(--s2) var(--s4); color:#fff; cursor:pointer; font-size:.875rem; white-space:nowrap; transition:background var(--tr)}
.hn-pill:hover{background:rgba(255,255,255,.22)}
.hn-pill .hp-dd{font-weight:700; color:var(--gold-500)}
.hn-all{color:#fff; font-weight:600; white-space:nowrap; cursor:pointer; display:flex; align-items:center; gap:4px; opacity:.9}
.hn-all:hover{opacity:1; text-decoration:none}
/* news blog */
.news-blog{display:grid; grid-template-columns:1fr 1fr; gap:var(--s5); align-items:start}
.news-hl{border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer; transition:box-shadow var(--tr); background:var(--bg)}
.news-hl:hover{box-shadow:var(--shadow)}
.hl-img{aspect-ratio:16/9; overflow:hidden; position:relative}
.hl-img img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform var(--tr)}
.news-hl:hover .hl-img img{transform:scale(1.04)}
.hl-body{padding:var(--s4)}
.hl-cat{font-size:.6875rem; font-weight:600; color:var(--green-900); background:var(--green-50); padding:2px var(--s2); border-radius:6px; display:inline-block; margin-bottom:var(--s2)}
.hl-title{font-size:1.125rem; font-weight:700; color:var(--green-900); line-height:1.35; margin-bottom:var(--s2)}
.hl-ex{font-size:.875rem; color:var(--ink-600); line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden}
.hl-date{font-size:.75rem; color:var(--ink-600); margin-top:var(--s3); display:flex; align-items:center; gap:4px}
.news-side{display:flex; flex-direction:column; gap:var(--s3)}
.ns-item{display:grid; grid-template-columns:80px 1fr; gap:var(--s3); padding:var(--s3); border:1px solid var(--line); border-radius:var(--radius); background:var(--bg); cursor:pointer; transition:background var(--tr),border-color var(--tr); align-items:start}
.ns-item:hover{background:var(--bg-alt); border-color:var(--ink-600)}
.ns-thumb{border-radius:6px; overflow:hidden; aspect-ratio:4/3; position:relative}
.ns-thumb img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform var(--tr)}
.ns-item:hover .ns-thumb img{transform:scale(1.05)}
.ns-cat{font-size:.625rem; font-weight:600; color:var(--green-900); background:var(--green-50); padding:1px var(--s2); border-radius:4px; display:inline-block; margin-bottom:3px}
.ns-title{font-size:.875rem; font-weight:600; color:var(--ink-900); line-height:1.35}
.ns-date{font-size:.75rem; color:var(--ink-600); margin-top:4px}
@media(max-width:860px){ .home-cols{grid-template-columns:1fr} }
/* hero responsive — placed after base rules so these win the source-order tie */
@media(max-width:860px){
  .hero{min-height:auto}
  .hero-inner{grid-template-columns:minmax(0,1fr); gap:var(--s5); padding:var(--s6) var(--s5)}
  .hero-today{max-width:520px}
  .hero-dots{margin-top:var(--s4)}
}
@media(max-width:600px){
  .logo span:not(.mark){display:none}          /* phone: keep MRC mark, drop long name so tools fit right */
  .page{padding-top:var(--s7)}                 /* more breathing room under the nav */
  .hero-wrap{margin-top:calc(var(--s7)*-1)}    /* keep the full-bleed hero flush to nav */
  .hero-inner{padding:var(--s7) var(--s4) var(--s6)}
  .hero h1{font-size:1.75rem}
  .hero-today{padding:var(--s4); max-width:none}
  .hero-next{flex-direction:column; align-items:flex-start; gap:var(--s3)}
  .hn-pills{width:100%}
  .news-blog{grid-template-columns:1fr}
}
@media(max-width:600px){
  .shortcut-grid{grid-template-columns:repeat(2,1fr)}
  .shortcut{padding:var(--s4) var(--s2)}
}
/* ============ P2 RACE DAY ============ */
.page-head{display:flex; flex-wrap:wrap; align-items:flex-start; justify-content:space-between; gap:var(--s3); margin-bottom:var(--s5)}
.page-head h1{margin-bottom:var(--s1)}
/* conditions panel ⭐ */
.conditions-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--s3)}
.cond-card{background:var(--green-50); border:1px solid var(--line); border-radius:var(--radius-lg); padding:var(--s5) var(--s4); text-align:center; transition:transform var(--tr),box-shadow var(--tr)}
.cond-card:hover{box-shadow:var(--shadow); transform:translateY(-2px)}
.cond-card .cc-ico{display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:50%; background:#fff; color:var(--green-700); line-height:1; margin-bottom:var(--s3)}
.cond-card .cc-label{font-size:.8125rem; color:var(--ink-600); display:flex; align-items:center; justify-content:center; gap:var(--s1); margin-bottom:var(--s1)}
.cond-card .cc-val{font-weight:600; color:var(--green-900); font-size:1.375rem; line-height:1.2}
.cond-card .cc-sub{font-size:.8125rem; color:var(--ink-600); margin-top:2px}
/* race list */
.race-list{display:flex; flex-direction:column; gap:var(--s2)}
.race-row{display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:var(--s4); padding:var(--s3) var(--s4); border:1px solid var(--line); border-radius:var(--radius); background:var(--bg); transition:background var(--tr)}
.race-row:hover{background:var(--bg-alt)}
.race-row.feat{border-color:var(--gold-500); background:var(--tint-sel)}
.race-row .rr-time{font-family:var(--font-mono); font-weight:600; font-size:1.0625rem; color:var(--green-900); min-width:54px}
.race-row .rr-name{font-weight:500}
.race-row .rr-meta{font-size:.8125rem; color:var(--ink-600); display:flex; flex-wrap:wrap; gap:var(--s2) var(--s3); margin-top:2px}
.race-row .rr-meta span{display:inline-flex; align-items:center; gap:4px}
.race-row .rr-meta span svg{color:var(--green-700)}
.race-row .rr-num{font-family:var(--font-mono); display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; background:var(--green-900); color:#fff; font-size:.8125rem; font-weight:600; flex:0 0 auto}
/* runners today */
.runner-tags{display:flex; flex-wrap:wrap; gap:var(--s2)}
.runner-tags a{display:inline-flex; align-items:center; gap:var(--s2); padding:var(--s2) var(--s3); border:1px solid var(--line); border-radius:999px; background:var(--bg); font-size:.9375rem; min-height:40px}
.runner-tags a:hover{background:var(--green-50); border-color:var(--green-700); text-decoration:none}
.runner-tags a .rt-race{font-family:var(--font-mono); font-size:.75rem; color:#fff; background:var(--green-700); border-radius:999px; padding:1px 7px}
/* experience */
.exp-grid{display:grid; grid-template-columns:1fr 1fr; gap:var(--s4)}
.exp-facts{display:flex; flex-direction:column; gap:var(--s3)}
.exp-facts .ef{display:flex; gap:var(--s3); align-items:flex-start}
.exp-facts .ef .ef-ico{display:inline-flex; color:var(--green-700)}
.exp-facts .ef .ef-k{font-weight:500} .exp-facts .ef .ef-v{color:var(--ink-600); font-size:.9375rem}
@media(max-width:1024px){ .conditions-grid{grid-template-columns:repeat(2,1fr)} .exp-grid{grid-template-columns:1fr} }
@media(max-width:600px){
  .conditions-grid{grid-template-columns:repeat(2,1fr)}
  .race-row{grid-template-columns:auto 1fr; row-gap:var(--s2)}
  .race-row .rr-action{grid-column:1/-1}
  .race-row .rr-action .btn{width:100%}
}
/* ============ P3 RACE CARD ============ */
/* race header */
.rc-header .rc-title{display:flex; align-items:baseline; gap:var(--s3); flex-wrap:wrap}
.rc-header .rc-no{font-family:var(--font-mono); background:var(--gold-500); color:var(--green-900); font-weight:600; padding:2px var(--s3); border-radius:8px}
.rc-meta{display:flex; flex-wrap:wrap; gap:var(--s2) var(--s5); margin-top:var(--s3); padding:var(--s3) 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line)}
.rc-meta .rcm{font-size:.9375rem; display:flex; align-items:center; gap:var(--s1)}
.rc-meta .rcm b{color:var(--green-900)}
.rc-meta .rcm .k{color:var(--ink-600)}
.rc-head-actions{display:flex; flex-wrap:wrap; gap:var(--s2); margin-top:var(--s3)}
/* race tabs */
.race-tabs{display:flex; gap:var(--s2); overflow-x:auto; padding:var(--s2) 0; -webkit-overflow-scrolling:touch}
.race-tabs button{flex:0 0 auto; min-width:46px; min-height:44px; padding:0 var(--s4); border:1px solid var(--line); border-radius:8px; background:#fff; font-family:var(--font-mono); font-weight:600; color:var(--ink-900); transition:all var(--tr)}
.race-tabs button:hover{background:var(--green-50)}
.race-tabs button.on{background:var(--green-900); color:#fff; border-color:var(--green-900)}
.race-tabs button.feat{border-color:var(--gold-500)}
.race-tabs button.feat.on{background:var(--green-900)}
/* view toggle */
.rc-toolbar{display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:var(--s3); margin:var(--s4) 0}
.view-toggle{display:inline-flex; border:1.5px solid var(--green-700); border-radius:9px; overflow:hidden}
.view-toggle button{padding:var(--s2) var(--s5); background:#fff; color:var(--green-700); border:none; min-height:44px; font-weight:600; font-size:.9375rem; transition:all var(--tr)}
.view-toggle button.on{background:var(--green-700); color:#fff}
.note-banner{background:var(--tint-sel); border:1px solid var(--gold-500); border-radius:8px; padding:var(--s2) var(--s3); font-size:.875rem; color:#7a5e0a; margin-bottom:var(--s3)}
/* SIMPLE view cards */
.rc-cards{display:grid; grid-template-columns:1fr 1fr; gap:var(--s3)}
.rc-card{border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4); background:var(--bg)}
.rc-card.feat{border-color:var(--gold-500); box-shadow:0 0 0 1px var(--gold-500) inset}
.rc-card-top{display:flex; align-items:center; gap:var(--s3); margin-bottom:var(--s3)}
.rc-num-badge{font-family:var(--font-mono); width:38px; height:38px; border-radius:50%; background:var(--green-900); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; flex:0 0 auto}
.silks{width:26px; height:26px; border-radius:6px; border:1px solid rgba(0,0,0,.18); flex:0 0 auto;
  background:linear-gradient(135deg,var(--sc) 0 43%,rgba(255,255,255,.85) 43% 57%,var(--sc) 57%);
  box-shadow:0 1px 2px rgba(0,0,0,.14)}
.silks-lg{width:32px; height:32px; border-radius:7px}
.rc-name{font-weight:600; font-size:1.0625rem; color:var(--green-700)}
.rc-name:hover{text-decoration:underline}
.rc-name .en{display:block; font-size:.8125rem; color:var(--ink-600); font-weight:400}
.rc-card-grid{display:grid; grid-template-columns:1fr 1fr; gap:var(--s2) var(--s4); font-size:.9375rem}
.rc-kv .k{color:var(--ink-600); font-size:.8125rem; display:flex; align-items:center}
.rc-kv .v{font-weight:500}
.rc-kv .v.mono{font-family:var(--font-mono)}
.rc-form-row{display:flex; align-items:center; gap:var(--s3); margin-top:var(--s3); padding-top:var(--s3); border-top:1px solid var(--line); flex-wrap:wrap}
/* FULL view dense table — frozen 3 cols + sticky header */
.rc-table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius-lg); max-height:70vh; box-shadow:var(--shadow)}
.rc-table{border-collapse:separate; border-spacing:0; min-width:780px; font-size:.9375rem; line-height:1.5}
.rc-table th,.rc-table td{padding:var(--s3) var(--s3); border-bottom:1px solid var(--line); white-space:nowrap; text-align:left}
.rc-table tbody tr:nth-child(odd) td{background:var(--bg)}
.rc-table tbody tr:nth-child(even) td{background:var(--bg-alt)}
.rc-table tbody tr:hover td{background:var(--green-50)}
.rc-table thead th{position:sticky; top:0; z-index:2; background:var(--green-900); color:#fff; font-weight:500; cursor:pointer; user-select:none}
.rc-table thead th:hover{background:#1c3052}
.rc-table th.sortable::after{content:" ⇅"; opacity:.5; font-size:.8em}
.rc-table th.sort-asc::after{content:" ↑"; opacity:1}
.rc-table th.sort-desc::after{content:" ↓"; opacity:1}
.rc-table .num-cell{font-family:var(--font-mono); text-align:right}
.rc-table .form-cell{font-family:var(--font-mono); letter-spacing:2px}
/* frozen columns */
.rc-table .c-num{position:sticky; left:0; z-index:1; width:42px; text-align:center; font-family:var(--font-mono); font-weight:600}
.rc-table .c-silks{position:sticky; left:42px; z-index:1; width:30px; padding:var(--s2)}
.rc-table .c-horse{position:sticky; left:72px; z-index:1; min-width:140px; box-shadow:3px 0 5px -2px rgba(0,0,0,.15)}
.rc-table thead .c-num,.rc-table thead .c-silks,.rc-table thead .c-horse{z-index:4}
.rc-table tbody .c-num,.rc-table tbody .c-silks,.rc-table tbody .c-horse{z-index:1}
.rc-table .c-horse a{color:var(--green-700); font-weight:600}
.rc-table .silks{margin:0 auto}
/* conditional highlight */
.rc-table td.hi{background:var(--tint-sel) !important; color:#7a5e0a; font-weight:700}
.delta-up{color:var(--good)} .delta-dn{color:#C62828} .delta-0{color:var(--ink-600)}
/* handicap box */
.handicap-box{background:var(--green-50); border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4)}
.hcap-scale{position:relative; height:10px; border-radius:999px; background:linear-gradient(90deg,var(--bad),var(--warn),var(--good)); margin:var(--s5) 0 var(--s3)}
.hcap-dot{position:absolute; top:50%; width:12px; height:12px; border-radius:50%; background:#fff; border:2px solid var(--green-900); transform:translate(-50%,-50%)}
.hcap-dot.feat{border-color:var(--gold-500); background:var(--gold-500); width:15px; height:15px; z-index:2}
.hcap-ends{display:flex; justify-content:space-between; font-size:.8125rem; color:var(--ink-600); font-family:var(--font-mono)}
/* legend */
.legend details{border:1px solid var(--line); border-radius:var(--radius); padding:var(--s3) var(--s4)}
.legend summary{cursor:pointer; font-weight:500; color:var(--green-700)}
.legend-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:var(--s2); margin-top:var(--s3); font-size:.875rem}
.legend-grid .lg-code{font-family:var(--font-mono); font-weight:600; color:var(--green-900); display:inline-block; min-width:38px}
.gear-legend-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:var(--s2) var(--s4); margin-top:var(--s3); font-size:.875rem}
.gl-row{display:flex; gap:var(--s3); align-items:baseline}
.gl-key{font-family:var(--font-mono); font-weight:600; color:var(--green-900); min-width:34px; flex:0 0 auto}
/* race-card header meta + simple-card bits */
.race-head-meta{display:flex; flex-wrap:wrap; gap:var(--s2) var(--s4); margin-top:var(--s2); font-size:.9375rem; color:var(--ink-600)}
.race-head-meta span{position:relative}
.race-head-meta span+span::before{content:"·"; position:absolute; left:calc(var(--s4)/-2); color:var(--line)}
.race-head-meta .rh-prize{color:var(--green-700); font-weight:600}
/* meta-strip — scannable icon+label+value grid (race-card header, horse hero) */
.meta-strip{display:grid; grid-template-columns:repeat(auto-fit,minmax(168px,1fr)); gap:var(--s3) var(--s4); margin-top:var(--s3); padding:var(--s4); background:var(--green-50); border:1px solid var(--line); border-radius:var(--radius-lg)}
.meta-strip .meta-item{align-items:center}
.meta-strip .meta-item>div{min-width:0}
.meta-strip .mi-k,.meta-strip .mi-v{overflow-wrap:anywhere}
.meta-strip .mi-ico{width:38px; height:38px; border-radius:9px; background:#fff; align-items:center; justify-content:center; flex:0 0 auto; box-shadow:0 1px 2px rgba(0,0,0,.05)}
.meta-strip .mi-v{font-size:1.0625rem; font-weight:600; color:var(--green-900)}
.meta-strip .mi-v.accent{color:var(--gold-500)}
.meta-strip.bare{background:none; border:none; padding:0; margin-top:0; gap:var(--s3) var(--s5)}
.meta-strip.bare .mi-ico{box-shadow:none}
.meta-strip.bare .mi-v{font-size:.9375rem; color:var(--ink-900)}
.h-inline{margin:0; font-size:1.25rem}
.rc-kv-v{margin-top:2px; font-weight:500}
.form-tag{font-size:.875rem; font-weight:600; padding:2px var(--s2); border-radius:6px}
.form-tag-good{background:var(--tint-green); color:#1B7A3D}
.form-tag-warn{background:#FCF3D9; color:#7a5e0a}
.form-tag-bad{background:#FBE9E7; color:#C62828}
/* scratched runner — race card */
.rc-scratch-badge{display:inline-flex; align-items:center; gap:4px; background:#FBE9E7; color:#C62828; font-size:.8125rem; font-weight:600; padding:2px var(--s2); border-radius:6px; white-space:nowrap}
.rc-scratch-badge.sm{margin-left:var(--s2); font-size:.75rem}
.rc-scratch-reason{display:flex; align-items:center; gap:5px; font-size:.8125rem; color:#C62828; margin:var(--s2) 0 0}
.rc-card.is-out{opacity:.72; background:repeating-linear-gradient(135deg,transparent,transparent 9px,rgba(198,40,40,.04) 9px,rgba(198,40,40,.04) 18px)}
.rc-card.is-out .rc-name{text-decoration:line-through; text-decoration-color:rgba(198,40,40,.6)}
.rc-table tr.is-out{opacity:.6}
.rc-table tr.is-out .c-horse a{text-decoration:line-through; text-decoration-color:rgba(198,40,40,.6)}
/* ===== P4 HORSE PROFILE ===== */
.horse-hero{display:grid; grid-template-columns:200px 1fr; gap:var(--s5); align-items:center; background:var(--green-50); border:1px solid var(--line); border-radius:var(--radius); padding:var(--s5)}
.horse-photo{aspect-ratio:1; border-radius:var(--radius); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:3.5rem; color:#fff; box-shadow:var(--shadow)}
.horse-photo img{width:100%; height:100%; object-fit:cover}
.horse-id h1{margin:0 0 2px}
.horse-id .en-name{font-size:1.0625rem; color:var(--ink-600); font-family:var(--font-mono)}
.horse-facts{display:flex; flex-wrap:wrap; gap:var(--s2) var(--s4); margin:var(--s3) 0; font-size:.9375rem; color:var(--ink-700)}
.horse-facts span{position:relative}
.horse-facts span+span::before{content:"·"; position:absolute; left:calc(var(--s4)/-2); color:var(--line)}
.rating-badge{display:inline-flex; align-items:baseline; gap:var(--s2); background:var(--green-900); color:#fff; border-radius:10px; padding:var(--s3) var(--s4)}
.rating-badge .rb-num{font-family:var(--font-mono); font-size:1.75rem; font-weight:700; line-height:1}
.rating-badge .rb-lab{font-size:.8125rem; opacity:.85}
/* horse health & racing status */
.horse-status-chip{display:inline-flex; align-items:center; gap:6px; padding:8px var(--s3); border-radius:999px; font-size:.9375rem; font-weight:600; border:1px solid transparent}
.horse-status-chip .hsc-ico{display:inline-flex}
.hs-fit{background:var(--tint-green); color:#1B7A3D; border-color:#bfe3c8}
.hs-out{background:#FBE9E7; color:#C62828; border-color:#f3c9c4}
.hs-spell{background:#EEEEEE; color:var(--ink-700); border-color:#dcdcdc}
.hs-first{background:#FCF3D9; color:#7a5e0a; border-color:#ecdca6}
.hs-watch{background:#FFF1E6; color:#b15a1a; border-color:#f3d3b5}
.cond-card.hs-fit{background:var(--tint-green); border-color:#bfe3c8} .cond-card.hs-fit .cc-ico{color:#1B7A3D}
.cond-card.hs-out{background:#FBE9E7; border-color:#f3c9c4} .cond-card.hs-out .cc-ico{color:#C62828}
.cond-card.hs-first{background:#FCF3D9; border-color:#ecdca6} .cond-card.hs-first .cc-ico{color:#7a5e0a}
.cond-card.hs-watch{background:#FFF1E6; border-color:#f3d3b5} .cond-card.hs-watch .cc-ico{color:#b15a1a}
.cond-card .cc-val.cc-val-sm{font-size:1rem; line-height:1.4}
.health-notes{display:flex; flex-direction:column; gap:var(--s2)}
.hn-row{display:flex; gap:var(--s3); align-items:flex-start; padding:var(--s3) var(--s4); border:1px solid var(--line); border-left:3px solid var(--green-700); border-radius:var(--radius); background:var(--bg)}
.hn-row.vet{border-left-color:#C0392B}
.hn-ico{flex:0 0 auto; display:inline-flex; margin-top:2px}
.hn-row.vet .hn-ico{color:#C0392B} .hn-row.steward .hn-ico{color:var(--green-700)}
.hn-meta{display:flex; align-items:center; gap:var(--s2); font-size:.8125rem; color:var(--ink-600); margin-bottom:2px}
.hn-tag{font-weight:600; color:var(--green-900)}
.hn-text{font-size:.9375rem; line-height:1.5}
/* career stats strip + win/place donut */
.career-strip{display:grid; grid-template-columns:repeat(5,1fr) minmax(200px,1.3fr); gap:var(--s3); margin-top:var(--s3)}
.stat-card{background:var(--bg); border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4) var(--s2); text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center}
.stat-card .sc-ico{display:inline-flex; color:var(--green-700); margin-bottom:var(--s1)}
.stat-card .sc-num{font-family:var(--font-mono); font-size:1.6rem; font-weight:700; color:var(--green-900); line-height:1}
.stat-card .sc-lab{font-size:.8125rem; color:var(--ink-600); margin-top:2px}
.stat-card.gold{border-color:var(--gold-500); background:var(--tint-sel)}
.stat-card.gold .sc-ico{color:#a9851c}
.winrate-card{display:flex; align-items:center; gap:var(--s4); background:var(--green-900); color:#fff; border-radius:var(--radius); padding:var(--s4)}
.winrate-card .wr-ring{position:relative; flex:0 0 auto}
.winrate-card .wr-ring .wr-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
.winrate-card .wr-legend{display:flex; flex-direction:column; gap:var(--s1); font-size:.8125rem}
.winrate-card .wr-legend i{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:6px; vertical-align:middle}
.winrate-card .wr-legend .v{font-family:var(--font-mono); font-weight:600; margin-left:4px}
/* recent form figures timeline */
.form-figures{display:flex; align-items:center; gap:var(--s1); flex-wrap:wrap; margin-top:var(--s4)}
.form-figures .ff-lab{font-size:.8125rem; color:var(--ink-600); margin-right:var(--s1)}
/* pp card meta with icons */
.pp-meta{display:flex; flex-wrap:wrap; gap:var(--s1) var(--s4); margin-top:var(--s2); font-size:.875rem; color:var(--ink-700)}
.pp-meta span{display:inline-flex; align-items:center; gap:5px}
.pp-meta .ico{color:var(--green-700)}
@media(max-width:1024px){ .career-strip{grid-template-columns:repeat(3,1fr)} .winrate-card{grid-column:1/-1} }
@media(max-width:600px){ .career-strip{grid-template-columns:repeat(2,1fr)} }
/* rating-trend line-chart (narrative) */
.rating-chart{margin-top:var(--s3); background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-lg); padding:var(--s5); box-shadow:var(--shadow)}
.rating-chart>svg{width:100%; height:auto; display:block}
.rc-grid{stroke:var(--line); stroke-width:1; stroke-dasharray:3 3}
.rc-area{stroke:none}
.rc-line{fill:none; stroke:var(--gold-500); stroke-width:2.5; stroke-linejoin:round; stroke-linecap:round}
.rc-dot{stroke:#fff; stroke-width:2}
.rc-axislab{fill:var(--ink-600); font-family:var(--font-mono); font-size:11px}
.rc-caption{display:flex; align-items:center; gap:var(--s2); margin-top:var(--s4); padding-top:var(--s3); border-top:1px solid var(--line); font-size:.9375rem; color:var(--ink-900)}
.rc-caption .ico{color:var(--ink-600); flex:0 0 auto}
.rc-caption.up .ico{color:var(--good)} .rc-caption.down .ico{color:var(--warn)}
.rc-legend{display:flex; flex-wrap:wrap; gap:var(--s2) var(--s4); margin-top:var(--s3); font-size:.8125rem; color:var(--ink-600)}
.rc-legend span{display:inline-flex; align-items:center; gap:6px}
.rc-legend i{width:11px; height:11px; border-radius:50%; display:inline-block}
/* ===== jockey/trainer profile + horse directory (P2) ===== */
.eyebrow-line{display:inline-block; font-size:.75rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--gold-500); margin-bottom:var(--s1)}
.person-role-chip{display:inline-flex; align-items:center; gap:6px; background:var(--green-50); color:var(--green-900); border:1px solid var(--line); border-radius:999px; padding:6px var(--s3); font-size:.875rem; font-weight:600; white-space:nowrap}
.person-role-chip .ico{color:var(--green-700)}
.race-tabs button.wide{padding:var(--s2) var(--s5); min-width:auto}
.person-stats{display:grid; grid-template-columns:repeat(6,1fr); gap:var(--s3)}
.res-chip{display:inline-block; font-family:var(--font-mono); font-size:.8125rem; font-weight:600; padding:2px var(--s2); border-radius:6px; white-space:nowrap}
.res-win{background:var(--tint-gold); color:#8a6d12; border:1px solid #e9d79b}
.res-place{background:var(--tint-green); color:#1B7A3D; border:1px solid #bfe3c8}
.res-back{background:var(--bg-alt); color:var(--ink-600); border:1px solid var(--line)}
.ent-link{color:var(--green-700); cursor:pointer; border-bottom:1px dotted transparent; transition:border-color var(--tr)}
.ent-link:hover{border-bottom-color:var(--green-700); text-decoration:none}
.ent-link.strong{font-weight:600}
/* generic scannable table (BHA/Bahrain list style) */
.simple-table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius-lg); box-shadow:var(--shadow)}
.simple-table{width:100%; border-collapse:collapse; font-size:.9375rem; background:var(--bg)}
.simple-table thead th{background:var(--green-900); color:#fff; font-weight:500; text-align:left; padding:var(--s3) var(--s4); white-space:nowrap}
.simple-table th.num,.simple-table td.num{text-align:right}
.simple-table tbody td{padding:var(--s3) var(--s4); border-top:1px solid var(--line); vertical-align:middle}
.simple-table tbody tr:nth-child(even){background:var(--bg-alt)}
.simple-table tbody tr:hover{background:var(--green-50)}
.simple-table .mono{font-family:var(--font-mono)}
/* about: committee (SOW §3.5) */
.committee-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--s3)}
.committee-card{display:flex; flex-direction:column; align-items:center; text-align:center; gap:var(--s2); background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-lg); padding:var(--s4)}
.cm-avatar{display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:50%; background:var(--green-50); color:var(--green-700)}
.cm-name{font-weight:600; color:var(--green-900)}
/* venue (SOW §3.6) */
.venue-grid{display:grid; grid-template-columns:1.2fr 1fr; gap:var(--s4); align-items:start}
.rules-list{display:flex; flex-direction:column; gap:var(--s2)}
.rule-row{display:flex; align-items:center; gap:var(--s3); width:100%; text-align:left; background:var(--bg); border:1px solid var(--line); border-radius:var(--radius); padding:var(--s3) var(--s4); font-family:inherit; font-size:.9375rem; color:var(--ink-900); cursor:pointer; transition:all var(--tr); min-height:48px}
.rule-row:hover{background:var(--green-50); border-color:var(--green-700)}
.rule-row .ico{color:var(--green-700); flex:0 0 auto}
@media(max-width:860px){ .committee-grid{grid-template-columns:repeat(2,1fr)} .venue-grid{grid-template-columns:1fr} }
/* race results (SOW §3.2) */
.result-card{border:1px solid var(--line); border-radius:var(--radius-lg); background:var(--bg); box-shadow:var(--shadow); overflow:hidden}
.result-head{display:flex; align-items:center; justify-content:space-between; gap:var(--s3); flex-wrap:wrap; padding:var(--s3) var(--s4); background:var(--green-50); border-bottom:1px solid var(--line)}
.result-head .res-rno{font-family:var(--font-mono); font-weight:700; color:#fff; background:var(--green-900); border-radius:6px; padding:2px var(--s2); font-size:.8125rem}
.result-row{display:grid; grid-template-columns:auto 1fr auto auto; align-items:center; gap:var(--s3); padding:var(--s3) var(--s4); border-bottom:1px solid var(--line)}
.result-row .res-pos{font-family:var(--font-mono); font-weight:700; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; background:var(--bg-alt); color:var(--ink-600)}
.result-row .res-pos.pos-1{background:var(--gold-500); color:var(--green-900)}
.result-row .res-pos.pos-2{background:#c9d2e0; color:var(--green-900)}
.result-row .res-pos.pos-3{background:#e3d2b8; color:var(--green-900)}
.result-row .res-jk{color:var(--ink-600); font-size:.875rem}
.result-row .res-sp{color:var(--ink-900); font-size:.875rem; white-space:nowrap}
.result-foot{display:flex; align-items:center; justify-content:space-between; gap:var(--s3); flex-wrap:wrap; padding:var(--s3) var(--s4)}
.result-foot .ico{color:var(--green-700)}
@media(max-width:600px){ .result-row{grid-template-columns:auto 1fr auto} .result-row .res-jk{grid-column:2; font-size:.8125rem} }
/* people quick-access cards */
.people-access{display:grid; grid-template-columns:repeat(2,1fr); gap:var(--s3); margin-top:var(--s4)}
.people-card{display:flex; align-items:center; gap:var(--s3); text-align:left; background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-lg); padding:var(--s4); cursor:pointer; transition:transform var(--tr),box-shadow var(--tr),border-color var(--tr)}
.people-card:hover{transform:translateY(-2px); box-shadow:var(--shadow-lg); border-color:var(--green-700)}
.people-card .pa-ico{display:inline-flex; align-items:center; justify-content:center; width:42px; height:42px; border-radius:50%; background:var(--green-900); color:#fff; flex:0 0 auto}
.people-card .pa-text{display:flex; flex-direction:column; flex:1; min-width:0}
.people-card .pa-role{font-size:.75rem; color:var(--ink-600)}
.people-card .pa-name{font-weight:600; color:var(--green-900)}
.people-card>.ico{color:var(--ink-600); flex:0 0 auto}
/* quick finder search */
.finder{display:flex; align-items:center; gap:var(--s2); background:var(--bg); border:1px solid var(--line); border-radius:999px; padding:var(--s2) var(--s4); max-width:480px; transition:border-color var(--tr),box-shadow var(--tr)}
.finder:focus-within{border-color:var(--green-700); box-shadow:0 0 0 3px rgba(48,82,138,.12)}
.finder-ico{display:inline-flex; color:var(--ink-600); flex:0 0 auto}
.finder input{flex:1; border:none; outline:none; background:transparent; font-family:inherit; font-size:.9375rem; color:var(--ink-900); min-width:0}
@media(max-width:1024px){ .person-stats{grid-template-columns:repeat(3,1fr)} }
@media(max-width:600px){ .person-stats{grid-template-columns:repeat(2,1fr)} .people-access{grid-template-columns:1fr} }
/* ===== race-card sub-tabs + analysis (P3.3/P3.4) ===== */
.sub-tabs{display:flex; gap:var(--s2); border-bottom:2px solid var(--line); margin:var(--s4) 0 0; overflow-x:auto}
.sub-tab{flex:0 0 auto; background:none; border:none; border-bottom:3px solid transparent; margin-bottom:-2px; padding:var(--s3) var(--s4); font-family:inherit; font-size:.9375rem; font-weight:600; color:var(--ink-600); cursor:pointer; transition:color var(--tr),border-color var(--tr); min-height:44px}
.sub-tab:hover{color:var(--green-900)}
.sub-tab.on{color:var(--green-900); border-bottom-color:var(--gold-500)}
.eval-pick{display:flex; flex-direction:column; gap:var(--s3); background:var(--green-50); border:1px solid var(--line); border-left:4px solid var(--gold-500); border-radius:var(--radius); padding:var(--s4); margin-bottom:var(--s4)}
.eval-pick .ep-label{display:flex; align-items:center; gap:4px; font-size:.8125rem; font-weight:600; color:var(--gold-500); text-transform:uppercase; letter-spacing:.04em}
.eval-pick .ep-label .ico{color:var(--gold-500)}
.eval-pick .ep-main{display:flex; align-items:center; gap:var(--s3)}
.eval-pick .ep-name{font-size:1.25rem; font-weight:600; color:var(--green-900)}
.eval-text{font-size:1rem; line-height:1.7; color:var(--ink-900); margin-bottom:var(--s3)}
.eval-pace{background:var(--bg-alt); border-radius:var(--radius); padding:var(--s3) var(--s4); font-size:.9375rem; color:var(--ink-900)}
/* ===== home: season stat-band + standings + feature story (P1.2/P1.3/P2.5) ===== */
.stat-band{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--s3)}
.sb-item{display:flex; flex-direction:column; align-items:center; text-align:center; gap:2px; background:var(--green-900); color:#fff; border-radius:var(--radius-lg); padding:var(--s5) var(--s3)}
.sb-item.gold{background:linear-gradient(135deg,#2c4a78,#264068); border:1px solid var(--gold-500)}
.sb-ico{display:inline-flex; color:var(--gold-500); margin-bottom:var(--s1)}
.sb-num{font-family:var(--font-mono); font-weight:700; font-size:1.75rem; line-height:1.1}
.sb-item.gold .sb-num{color:var(--gold-500)}
.sb-lab{font-size:.8125rem; opacity:.85}
.standings-grid{display:grid; grid-template-columns:1fr 1fr; gap:var(--s4)}
.standings-card{background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow)}
.standings-card .st-head{background:var(--green-50); color:var(--green-900); font-weight:600; padding:var(--s3) var(--s4); border-bottom:1px solid var(--line)}
.st-row{display:grid; grid-template-columns:auto 1fr auto auto; align-items:center; gap:var(--s3); padding:var(--s3) var(--s4); border-top:1px solid var(--line); cursor:pointer; transition:background var(--tr)}
.st-row:hover{background:var(--green-50)}
.st-row:focus-visible{outline:2px solid var(--gold-500); outline-offset:-2px}
.st-row:first-of-type{border-top:none}
.st-rank{font-family:var(--font-mono); font-weight:700; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; background:var(--bg-alt); color:var(--ink-600); font-size:.8125rem}
.st-rank.lead{background:var(--gold-500); color:var(--green-900)}
.st-name{min-width:0}
.st-wins{font-size:.875rem; color:var(--ink-600); white-space:nowrap}
.st-pct{font-size:.875rem; color:var(--green-700); font-weight:600}
.hl-eyebrow{position:absolute; top:var(--s3); left:var(--s3); display:inline-flex; align-items:center; gap:4px; background:var(--gold-500); color:var(--green-900); font-size:.6875rem; font-weight:700; padding:3px var(--s2); border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.2)}
.feature-story .hl-img{position:relative}
/* home calendar + programme (Bahrain "Season Calendar + Racecards & Results") */
.home-cal-grid{display:grid; grid-template-columns:auto 1fr; gap:var(--s5); align-items:start}
.home-cal-left{background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-lg); padding:var(--s4); box-shadow:var(--shadow)}
.home-prog{background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-lg); padding:var(--s4); box-shadow:var(--shadow)}
.home-prog-head{display:flex; align-items:center; justify-content:space-between; gap:var(--s3); padding-bottom:var(--s3); border-bottom:1px solid var(--line); margin-bottom:var(--s2)}
.hp-day{font-size:.8125rem; color:var(--ink-600)}
.hp-name{font-weight:600; color:var(--green-900); font-size:1.0625rem}
.home-prog-list{display:flex; flex-direction:column}
.hp-race{display:flex; align-items:center; gap:var(--s3); padding:var(--s3) 0; border-bottom:1px solid var(--line)}
.hp-race:last-child{border-bottom:none}
.hp-race.feat{background:var(--tint-sel); margin:0 calc(var(--s3)*-1); padding-left:var(--s3); padding-right:var(--s3); border-radius:8px; border-bottom:none}
.hp-time{font-weight:600; color:var(--green-900); min-width:48px}
.hp-rnum{font-family:var(--font-mono); display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; background:var(--green-900); color:#fff; font-size:.8125rem; font-weight:600; flex:0 0 auto}
.hp-rname{flex:1; min-width:0; font-size:.9375rem; color:var(--ink-900)}
/* race-day updates feed */
.updates-feed{display:flex; flex-direction:column; gap:var(--s2); margin-top:var(--s3)}
.upd-row{display:flex; gap:var(--s3); align-items:flex-start; background:var(--bg); border:1px solid var(--line); border-left:3px solid var(--green-700); border-radius:var(--radius); padding:var(--s3) var(--s4)}
.upd-ico{display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:8px; background:var(--green-50); color:var(--green-700); flex:0 0 auto}
.upd-row.scratch-row{} .upd-ico.upd-scratch{background:var(--tint-warn); color:#C62828}
.upd-ico.upd-handicap{background:var(--tint-gold); color:#8a6d12}
.upd-body{flex:1; min-width:0}
.upd-text{font-size:.9375rem; color:var(--ink-900); line-height:1.5}
.upd-time{font-size:.75rem; color:var(--ink-600); margin-top:2px}
/* two big CTA cards */
.big-cards{display:grid; grid-template-columns:1fr 1fr; gap:var(--s4)}
.big-card{position:relative; display:flex; flex-direction:column; align-items:flex-start; text-align:left; min-height:200px; padding:var(--s5); border:none; border-radius:var(--radius-lg); color:#fff; background-size:cover; background-position:center; cursor:pointer; overflow:hidden; box-shadow:var(--shadow); transition:transform var(--tr),box-shadow var(--tr)}
.big-card:hover{transform:translateY(-3px); box-shadow:var(--shadow-lg)}
.big-card .bc-eyebrow{font-size:.75rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--gold-500); margin-bottom:var(--s2)}
.big-card .bc-title{font-size:1.5rem; font-weight:700; line-height:1.2; margin-bottom:var(--s2)}
.big-card .bc-sub{font-size:.9375rem; color:#E8F2ED; max-width:34ch; margin-bottom:auto}
.big-card .bc-go{display:inline-flex; align-items:center; gap:6px; margin-top:var(--s4); font-weight:600; color:#fff; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.3); border-radius:999px; padding:8px var(--s4)}
.big-card:hover .bc-go{background:var(--gold-500); color:var(--green-900); border-color:var(--gold-500)}
@media(max-width:860px){ .stat-band{grid-template-columns:repeat(2,1fr)} .standings-grid{grid-template-columns:1fr} .home-cal-grid{grid-template-columns:1fr} .big-cards{grid-template-columns:1fr} .home-cal-left{display:flex; flex-wrap:wrap; gap:var(--s5)} }
/* horse form filter chips (P3.5) */
.form-filter{display:flex; flex-wrap:wrap; gap:var(--s2); margin:var(--s3) 0}
.ff-chip{display:inline-flex; align-items:center; background:var(--bg); border:1px solid var(--line); border-radius:999px; padding:6px var(--s4); font-family:inherit; font-size:.875rem; color:var(--ink-900); cursor:pointer; min-height:44px; transition:all var(--tr)}
.ff-chip:hover{background:var(--green-50); border-color:var(--green-700)}
.ff-chip.on{background:var(--green-900); color:#fff; border-color:var(--green-900)}
/* ===== race-day calendar + month accordion (P3.1/P3.2) ===== */
.cal-toggle{display:inline-flex; align-items:center; gap:6px; margin-top:var(--s3); background:var(--bg); border:1px solid var(--line); border-radius:999px; padding:var(--s2) var(--s4); font-family:inherit; font-size:.9375rem; font-weight:600; color:var(--green-900); cursor:pointer; min-height:44px; transition:all var(--tr)}
.cal-toggle:hover{background:var(--green-50); border-color:var(--green-700)}
.cal-toggle.on{background:var(--green-50)}
.cal-toggle .ico{color:var(--green-700)}
.cal-panel{margin-top:var(--s3); background:var(--bg); border:1px solid var(--line); border-radius:var(--radius-lg); padding:var(--s5); box-shadow:var(--shadow)}
.cal-filter{display:flex; flex-wrap:wrap; gap:var(--s2); margin-bottom:var(--s4)}
.cal-months{display:flex; flex-wrap:wrap; gap:var(--s5)}
.cal-month{flex:0 0 auto}
.cal-title{font-weight:600; color:var(--green-900); margin-bottom:var(--s2)}
.cal-grid{display:grid; grid-template-columns:repeat(7,40px); gap:3px}
.cal-dow{display:flex; align-items:center; justify-content:center; height:24px; font-size:.6875rem; color:var(--ink-600)}
.cal-cell{display:flex; align-items:center; justify-content:center; height:40px; border-radius:8px; font-family:var(--font-mono); font-size:.8125rem; color:var(--ink-900); background:transparent; border:none}
.cal-cell.empty{visibility:hidden}
button.cal-cell{cursor:pointer}
.cal-cell.cal-race{background:var(--gold-500); color:var(--green-900); font-weight:700; box-shadow:0 1px 3px rgba(191,148,45,.4); transition:transform var(--tr)}
.cal-cell.cal-race:hover{transform:scale(1.08)}
.cal-cell.cal-sel{outline:2px solid var(--green-900); outline-offset:1px}
.cal-legend-dot{display:inline-block; width:12px; height:12px; border-radius:4px; background:var(--gold-500); vertical-align:middle}
.fx-accordion details{border:1px solid var(--line); border-radius:var(--radius); margin-top:var(--s3); overflow:hidden}
.fx-accordion summary{cursor:pointer; padding:var(--s3) var(--s4); font-weight:600; color:var(--green-900); background:var(--green-50); list-style:none}
.fx-accordion summary::-webkit-details-marker{display:none}
.fx-acc-row{display:flex; align-items:center; gap:var(--s3); padding:var(--s3) var(--s4); border-top:1px solid var(--line)}
.fx-acc-row.sel{background:var(--tint-sel)}
.fx-entry{font-size:.75rem; color:var(--green-700); margin-top:2px; display:flex; align-items:center; gap:4px}
/* basic info key-value panel */
.info-grid{display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
.info-grid .kv{display:flex; justify-content:space-between; gap:var(--s3); padding:var(--s3) var(--s4); border-bottom:1px solid var(--line)}
.info-grid .kv:nth-child(odd){border-right:1px solid var(--line)}
.info-grid .kv .k{color:var(--ink-600); font-size:.9375rem}
.info-grid .kv .v{font-weight:500; text-align:right}
/* ===== past performance — dual mode (cards / dense table) ===== */
/* finish badge — color-coded result */
.pp-badge{font-family:var(--font-mono); font-weight:700; display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:24px; padding:0 7px; border-radius:6px}
.pp-badge.b-win{background:#FCF3D9; color:#7a5e0a} .pp-badge.b-place{background:var(--tint-green); color:#1B7A3D}
.pp-badge.b-back{background:var(--bg-alt); color:var(--ink-700)} .pp-badge.b-dnf{background:#FBE9E7; color:#C62828}
/* group filter chips */
.pp-chips{display:flex; flex-wrap:wrap; gap:var(--s2); margin:var(--s3) 0}
.pp-chip{font-size:.875rem; padding:var(--s1) var(--s3); min-height:34px; border-radius:999px; border:1px solid var(--line); background:#fff; color:var(--ink-700); cursor:pointer; transition:all var(--tr)}
.pp-chip:hover{border-color:var(--green-700)}
.pp-chip.on{background:var(--green-50); color:var(--green-900); border-color:var(--green-700); font-weight:600}
.pp-chip.locked{background:var(--bg-alt); color:var(--ink-600); cursor:default; opacity:.9}
/* dense table — frozen first 2 cols + sticky header + horizontal scroll */
.pp-scroll{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius-lg); max-height:70vh; box-shadow:var(--shadow)}
.pp-dense th,.pp-dense td{padding:var(--s3) var(--s3)}
.pp-dense{border-collapse:separate; border-spacing:0; min-width:760px; font-size:.9375rem; line-height:1.5}
.pp-dense th,.pp-dense td{padding:var(--s2) var(--s3); border-bottom:1px solid var(--line); white-space:nowrap; text-align:left}
.pp-dense thead th{position:sticky; top:0; z-index:3; background:var(--green-900); color:#fff; font-weight:500}
.pp-dense .num{text-align:right; font-family:var(--font-mono)}
.pp-dense .fz1{position:sticky; left:0; z-index:2; background:#fff; min-width:78px}
.pp-dense .fz2{position:sticky; left:78px; z-index:2; background:#fff; box-shadow:3px 0 5px -3px rgba(0,0,0,.25)}
.pp-dense thead .fz1,.pp-dense thead .fz2{z-index:4; background:var(--green-900)}
.pp-dense .fz1 a{color:var(--green-700); font-weight:600}
.pp-dense tbody tr:hover td{background:var(--green-50)}
/* cards */
.pp-cards{display:grid; grid-template-columns:1fr 1fr; gap:var(--s3); margin-top:var(--s3)}
.pp-card{border:1px solid var(--line); border-radius:var(--radius); padding:var(--s4); background:var(--bg)}
.pp-card.win{border-color:var(--gold-500); box-shadow:0 0 0 1px var(--gold-500) inset}
.pp-card-top{display:flex; align-items:flex-start; gap:var(--s3)}
.pp-card-h{font-weight:600}
.pp-card-h a{color:var(--green-700)}
.pp-exp{margin-top:var(--s3); font-size:.9375rem; background:transparent; border:none; color:var(--green-700); cursor:pointer; padding:0}
.pp-card-detail{margin-top:var(--s3); padding-top:var(--s3); border-top:1px solid var(--line)}
.pp-grp-h{font-size:.75rem; color:var(--ink-600); letter-spacing:.04em; margin:var(--s3) 0 var(--s1); text-transform:uppercase}
.pp-kv{display:grid; grid-template-columns:1fr 1fr; gap:var(--s2) var(--s4); font-size:.9375rem}
.pp-kv .k{color:var(--ink-600); font-size:.8125rem; display:block}
.pp-comment{line-height:1.6}
/* stewards / related */
.stewards details, .related-box{border:1px solid var(--line); border-radius:var(--radius); padding:var(--s3) var(--s4)}
.stewards summary{cursor:pointer; font-weight:500; color:var(--green-700)}
.steward-item{padding:var(--s2) 0; border-bottom:1px solid var(--line); font-size:.9375rem}
.steward-item:last-child{border-bottom:none}
.related-links{display:flex; flex-wrap:wrap; gap:var(--s2); margin-top:var(--s2)}
.related-links a{display:inline-flex; align-items:center; gap:var(--s2); padding:var(--s2) var(--s3); border:1px solid var(--line); border-radius:999px; color:var(--ink-700); font-size:.9375rem}
.related-links a:hover{background:var(--green-50); border-color:var(--green-700)}
@media(max-width:600px){
  .rc-cards{grid-template-columns:1fr}
  .rc-toolbar{flex-direction:column; align-items:stretch}
  .view-toggle{width:100%} .view-toggle button{flex:1}
  .horse-hero{grid-template-columns:1fr; text-align:center} .horse-photo{max-width:160px; margin:0 auto}
  .horse-facts{justify-content:center}
  .info-grid{grid-template-columns:1fr} .info-grid .kv:nth-child(odd){border-right:none}
  .pp-cards{grid-template-columns:1fr}
}
/* ===== PHASE 3 — micro-interactions, selection, scrollbars, empty state ===== */
/* card hover lift (interactive content cards only) */
.rc-card,.pp-card,.audience-card,.news-card{transition:box-shadow var(--tr),transform var(--tr),border-color var(--tr)}
.rc-card:hover,.pp-card:hover,.audience-card:hover,.news-card:hover{box-shadow:var(--shadow-lg); transform:translateY(-2px)}
.rc-card.feat:hover{box-shadow:var(--shadow-lg),0 0 0 1px var(--gold-500) inset}
.pp-card.win:hover{box-shadow:var(--shadow-lg),0 0 0 1px var(--gold-500) inset}
/* press feedback */
.btn:active{transform:translateY(1px)}
.chip:active,.race-tabs button:active,.view-toggle button:active,.pp-chip:active{transform:translateY(1px)}
/* text selection on-brand */
::selection{background:var(--green-700); color:#fff}
/* slim themed scrollbars on the dense scroll containers */
.rc-table-wrap::-webkit-scrollbar,.pp-scroll::-webkit-scrollbar{height:10px; width:10px}
.rc-table-wrap::-webkit-scrollbar-track,.pp-scroll::-webkit-scrollbar-track{background:transparent}
.rc-table-wrap::-webkit-scrollbar-thumb,.pp-scroll::-webkit-scrollbar-thumb{background:var(--line); border-radius:999px; border:2px solid var(--bg)}
.rc-table-wrap::-webkit-scrollbar-thumb:hover,.pp-scroll::-webkit-scrollbar-thumb:hover{background:var(--ink-600)}
.rc-table-wrap,.pp-scroll{scrollbar-width:thin; scrollbar-color:var(--line) transparent}
/* empty state */
.empty-state{text-align:center; padding:var(--s6) var(--s4); color:var(--ink-600)}
.empty-state .es-ico{color:var(--line); margin-bottom:var(--s3); display:inline-flex}
.empty-state .es-title{font-weight:500; color:var(--ink-900); margin-bottom:var(--s1)}
.search-empty{display:flex; align-items:center; gap:var(--s2); padding:var(--s3) var(--s4); color:var(--ink-600); font-size:.9375rem}
.search-empty .ico{color:var(--ink-600)}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{transition:none !important; animation:none !important}
  .rc-card:hover,.pp-card:hover,.audience-card:hover,.news-card:hover,.cond-card:hover{transform:none}
}

function icon(name,size){
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox','0 0 24 24'); svg.setAttribute('width',size||20); svg.setAttribute('height',size||20);
  svg.setAttribute('fill','none'); svg.setAttribute('stroke','currentColor');
  svg.setAttribute('stroke-width','1.75'); svg.setAttribute('stroke-linecap','round'); svg.setAttribute('stroke-linejoin','round');
  svg.setAttribute('class','ico'); svg.setAttribute('aria-hidden','true');
  svg.innerHTML=ICON_PATHS[name]||ICON_PATHS.info;
  return svg;
}

function tooltip(text){
  const wrap=el('span',{class:'tip'});
  const btn=el('button',{class:'tip-btn','aria-label':'คำอธิบาย',type:'button'},'?');
  const pop=el('span',{class:'tip-pop',role:'tooltip'},text);
  btn.addEventListener('click',e=>{e.stopPropagation(); const open=wrap.classList.contains('open');
    $$('.tip.open').forEach(t=>t.classList.remove('open')); if(!open)wrap.classList.add('open');});
  wrap.append(btn,pop); return wrap;
}
document.addEventListener('click',()=>$$('.tip.open').forEach(t=>t.classList.remove('open')));

/* ============ MODAL HELPER ============ */
function openModal(title,bodyNode){
  $('#modalTitle').textContent=title; const b=$('#modalBody'); b.innerHTML='';
  b.append(bodyNode); $('#modalBackdrop').classList.add('open');
}
function closeModal(){$('#modalBackdrop').classList.remove('open');}
$('#modalClose').addEventListener('click',closeModal);
$('#modalBackdrop').addEventListener('click',e=>{if(e.target===$('#modalBackdrop'))closeModal();});

/* placeholder feedback (never silent) */

/* ============ ROUTER ============ */
const PAGES=['landing','raceday','racecard','horse','jockey','trainer','horses','jockeys','trainers','owners','owner','leaderboard','results','news','about','venue','experience'];
const RENDERERS={}; // each page registers RENDERERS[id]=fn
const RENDERED={};
function showPage(id,opts){
  if(!PAGES.includes(id))id='landing';
  $$('.page').forEach(p=>p.classList.remove('active'));
  const sec=document.getElementById(id);
  // (re)render — pages may re-render when opts change (e.g. race no.)
  if(RENDERERS[id]){RENDERERS[id](sec,opts||{}); RENDERED[id]=true;}
  else if(!RENDERED[id]){sec.innerHTML='<p class="muted">(หน้านี้กำลังพัฒนา)</p>';}
  setLang(document.documentElement.getAttribute('data-lang')||'th'); // re-localize freshly rendered nodes
  sec.classList.add('active');
  // nav active state
  const PEOPLE=['horses','jockeys','trainers','owners','horse','jockey','trainer','owner'];
  const RACING=['raceday','racecard','leaderboard','results'];
  $$('nav.main a[data-go]').forEach(a=>a.classList.toggle('active',
    a.dataset.go===id
    || (RACING.includes(id) && a.dataset.go==='raceday' && a.classList.contains('nav-dd-toggle'))
    || (PEOPLE.includes(id) && a.dataset.go==='horses' && a.classList.contains('nav-dd-toggle'))));
  $('#mainNav').classList.remove('open'); $('#hamburger').setAttribute('aria-expanded','false');
  window.scrollTo(0,0);
}
/* parse hash like #racecard?no=3 */
function parseHash(){
  const raw=location.hash.slice(1)||'landing';
  const [id,qs]=raw.split('?'); const opts={};
  if(qs)qs.split('&').forEach(p=>{const[k,v]=p.split('='); opts[k]=decodeURIComponent(v||'');});
  return {id,opts};
}
function route(){const{id,opts}=parseHash(); showPage(id,opts);}
window.addEventListener('hashchange',route);
/* nav helper: navigate programmatically */
function go(id,opts){let h='#'+id;
  if(opts&&Object.keys(opts).length)h+='?'+Object.entries(opts).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  location.hash=h;}
window.go=go;

/* delegate clicks for data-go / data-dead */
document.addEventListener('click',e=>{
  const dead=e.target.closest('[data-dead]');
  if(dead){e.preventDefault(); placeholder('ส่วนนี้อยู่นอกขอบเขตของ prototype (ทำเฉพาะ 4 หน้าหลัก: หน้าแรก, Race Day, Race Card, โปรไฟล์ม้า)'); return;}
  const goEl=e.target.closest('[data-go]');
  if(goEl){e.preventDefault(); go(goEl.dataset.go); }
});

/* ============ TH/EN TOGGLE (nav + headings only) ============ */
function setLang(lang){
  document.documentElement.setAttribute('data-lang',lang);
  $$('.i18n').forEach(n=>{const t=n.getAttribute('data-'+lang); if(t!=null)n.innerHTML=t;});
  $$('[data-lang-btn]').forEach(b=>b.classList.toggle('on',b.dataset.langBtn===lang));
}
$$('[data-lang-btn]').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.langBtn)));

/* ============ HAMBURGER ============ */
$('#hamburger').addEventListener('click',()=>{
  const nav=$('#mainNav'); const open=nav.classList.toggle('open');
  $('#hamburger').setAttribute('aria-expanded',open);
});
